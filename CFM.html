              fontFamily:"var(--sans)",transition:"all .18s",display:"flex",alignItems:"center",gap:7,
              background:subTab===t.key?(t.accent?"rgba(255,176,32,.18)":"var(--blue-g)"):"transparent",
              color:subTab===t.key?(t.accent?"var(--amber)":"var(--sky)"):"var(--muted)"}}>
            {t.label}
            <span style={{background:subTab===t.key?(t.accent?"rgba(255,176,32,.25)":"rgba(95,168,255,.2)"):"rgba(255,255,255,.05)",
              color:subTab===t.key?(t.accent?"var(--amber)":"var(--sky)"):"var(--muted)",
              borderRadius:100,fontSize:10,fontWeight:700,padding:"1px 7px",minWidth:20,textAlign:"center"}}>
              {t.count}
            </span>
          </button>
        ))}
      </div>

      {/* AAHAR banner when on that tab */}
      {subTab==="aahar"&&(
        <div style={{background:"rgba(255,176,32,.07)",border:"1px solid rgba(255,176,32,.3)",borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:24}}>🎪</span>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"var(--amber)",marginBottom:2}}>AAHAR Exhibition Leads</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>
              {aaharLeads.length} lead{aaharLeads.length!==1?"s":""} collected from AAHAR · Click WhatsApp 
              <svg style={{display:"inline",verticalAlign:"middle",margin:"0 3px"}} width="12" height="12" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              on any row to reach out directly
            </div>
          </div>
          <div style={{marginLeft:"auto",fontFamily:"var(--serif)",fontSize:24,fontWeight:700,color:"var(--amber)"}}>
            {aaharLeads.filter(l=>!["not_relevant","on_hold"].includes(l.status)).reduce((s,l)=>s+(parseInt(l.revenue)||0),0)>0
              ? fmtRev(aaharLeads.filter(l=>!["not_relevant","on_hold"].includes(l.status)).reduce((s,l)=>s+(parseInt(l.revenue)||0),0))
              : `${aaharLeads.length} leads`}
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
        <StatCard label="Total Leads"     value={leads.length}                                                          icon="👥" accent="var(--blue)"/>
        <StatCard label="Follow-ups Today" value={todayFollowUps} sub={overdueCount>0?`${overdueCount} overdue`:""}     icon="🔔" accent={overdueCount>0?"var(--red)":"var(--amber)"}/>
        <StatCard label="Hot Pipeline"    value={leads.filter(l=>["negotiation","proposal_sent","demo_scheduled"].includes(l.status)).length} icon="🔥" accent="var(--amber)"/>
        <StatCard label="Potential Revenue" value={fmtRev(totalRev)} sub="Active pipeline"                              icon="💰" accent="var(--teal)"/>
        <StatCard label="Not Converted"   value={leads.filter(l=>["retarget","on_hold","future_prospect","not_relevant"].includes(l.status)).length} icon="⏸" accent="var(--muted)"/>
      </div>

      {/* Status summary bar */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:"14px 18px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginRight:4}}>Status breakdown</span>
        {STATUSES.map(s=>{
          const cnt=leads.filter(l=>l.status===s.key).length;
          if(cnt===0) return null;
          return (
            <button key={s.key} onClick={()=>setFStatus(fStatus===s.key?"":s.key)}
              style={{background:fStatus===s.key?s.bg:"rgba(255,255,255,.04)",border:`1px solid ${fStatus===s.key?s.color:"var(--bdr)"}`,color:fStatus===s.key?s.color:"var(--body)",padding:"3px 10px",borderRadius:100,fontSize:10,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:s.color,display:"inline-block"}}/>
              {s.label} <span style={{opacity:.7}}>({cnt})</span>
            </button>
          );
        })}
        {fStatus&&<button onClick={()=>setFStatus("")} style={{background:"none",border:"none",color:"var(--muted)",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Clear filter</button>}
      </div>

      {/* Table */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"13px 18px",borderBottom:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:"var(--serif)",fontSize:13,fontWeight:600,color:"var(--white)"}}>All Leads</span>
          <span style={{fontSize:11,color:"var(--muted)"}}>{filtered.length} of {leads.length}</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>{["Client / Brand","Contact & Phone","Status","Potential Revenue","Follow-up","Last Contacted","Assigned To","Actions"].map(h=>(
                <th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:9,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",borderBottom:"1px solid var(--bdr)",whiteSpace:"nowrap"}}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {filtered.length===0&&<tr><td colSpan={8} style={{padding:32,textAlign:"center",color:"var(--muted)"}}>No leads match your filters.</td></tr>}
              {filtered.map(l=>{
                const fu = l.followDate;
                const fuColor = isPast(fu)?"var(--red)":isToday(fu)?"var(--amber)":isSoon(fu)?"var(--amber)":"var(--muted)";
                const lc = fmtLastContacted(l.lastContacted);
                const isSelected = detailLead && detailLead.id === l.id;
                return (
                  <tr key={l.id}
                    onClick={()=>setDetailLead(isSelected?null:l)}
                    style={{borderBottom:"1px solid var(--bdr)",transition:"background .12s",cursor:"pointer",
                      background:isSelected?"rgba(61,111,255,.08)":"transparent"}}
                    onMouseEnter={e=>{ if(!isSelected) e.currentTarget.style.background="rgba(61,111,255,.04)"; }}
                    onMouseLeave={e=>{ if(!isSelected) e.currentTarget.style.background="transparent"; }}>

                    {/* Client / Brand */}
                    <td style={{padding:"11px 14px"}}>
                      <div style={{fontWeight:600,color:"var(--white)",fontSize:13,display:"flex",alignItems:"center",gap:7}}>
                        {isSelected && <span style={{width:5,height:5,borderRadius:"50%",background:"var(--blue)",display:"inline-block",flexShrink:0}}/>}
                        {l.name}
                      </div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{l.type} · {l.city||"—"}</div>
                    </td>

                    {/* Contact & Phone */}
                    <td style={{padding:"11px 14px"}}>
                      <div style={{fontSize:12,color:"var(--body)"}}>{l.contact||"—"}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{l.phone||"—"}</div>
                    </td>

                    {/* Status */}
                    <td style={{padding:"11px 14px"}}><Badge status={l.status}/></td>

                    {/* Potential Revenue */}
                    <td style={{padding:"11px 14px",fontFamily:"var(--serif)",fontSize:13,color:"var(--teal)",whiteSpace:"nowrap"}}>
                      {fmtRev(parseInt(l.revenue)||0)}
                    </td>

                    {/* Follow-up */}
                    <td style={{padding:"11px 14px",whiteSpace:"nowrap"}}>
                      {fu ? (
                        <div>
                          <div style={{fontSize:11,fontWeight:600,color:fuColor}}>
                            {isPast(fu)?"⚠ Overdue":isToday(fu)?"🔔 Today":fmtDate(fu)}
                          </div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>{l.followTime||""}</div>
                        </div>
                      ) : <span style={{color:"var(--muted)",fontSize:11}}>—</span>}
                    </td>

                    {/* Last Contacted */}
                    <td style={{padding:"11px 14px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,fontWeight:500,color:lc.color}}>{lc.label}</span>
                        <button title="Log contact as today"
                          onClick={async e=>{ e.stopPropagation();
                            try {
                              const r = await fetch(API_BASE+'/api/leads/'+l.id+'/log-contact', {method:'POST', headers:authHeaders()});
                              if(r.ok){ const saved=await r.json(); const upd=leads.map(x=>x.id===l.id?saved:x); setLeads(upd); if(isSelected) setDetailLead(upd.find(x=>x.id===l.id)); }
                            } catch(e) {}
                            showToast(`✓ Contact logged for ${l.name}`); }}
                          style={{width:20,height:20,borderRadius:5,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",flexShrink:0}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--teal)";e.currentTarget.style.color="var(--teal)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.color="var(--muted)";}}>✓</button>
                      </div>
                    </td>

                    {/* Assigned To */}
                    <td style={{padding:"11px 14px"}}>
                      <div style={{fontSize:11,color:"var(--body)",whiteSpace:"nowrap"}}>{l.owner}</div>
                    </td>

                    {/* Actions */}
                    <td style={{padding:"11px 14px"}}>
                      <div style={{display:"flex",gap:6}}>
                        <WABtn phone={l.phone} name={l.name}/>
                        <button title="Edit" onClick={e=>{e.stopPropagation();setEditLead(l);setDetailLead(null);setAddOpen(true);}}
                          style={{width:26,height:26,borderRadius:6,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:12,transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--blue)";e.currentTarget.style.background="var(--blue-g)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.background="var(--surf)";}}>✏</button>
                        <button title="Delete" onClick={e=>{e.stopPropagation();if(isSelected)setDetailLead(null);deleteLead(l.id);}}
                          style={{width:26,height:26,borderRadius:6,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:12,transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--red)";e.currentTarget.style.background="var(--red-g)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.background="var(--surf)";}}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Modals */}
      <Modal open={addOpen} onClose={()=>{setAddOpen(false);setEditLead(null);}} title={editLead?"Edit Lead":"Add New Lead"} width={640}>
        <LeadForm initial={editLead} onSave={saveLead} onCancel={()=>{setAddOpen(false);setEditLead(null);}}/>
      </Modal>
      <BulkModal open={bulkOpen} onClose={()=>setBulkOpen(false)} onImport={bulkImport}/>

      {/* Detail panel */}
      <LeadDetailPanel
        lead={detailLead}
        onClose={()=>setDetailLead(null)}
        onEdit={l=>{setDetailLead(null);setEditLead(l);setAddOpen(true);}}
        onLogContact={async id=>{ try { const r=await fetch(API_BASE+'/api/leads/'+id+'/log-contact',{method:'POST',headers:authHeaders()}); if(r.ok){const saved=await r.json();setLeads(prev=>prev.map(x=>x.id===id?saved:x));setDetailLead(saved);} } catch(e){} showToast("✓ Contact logged"); }}
      />
    </div>
  );
};

/* ── CLIENT RETENTION MODULE ───────────────────── */
const emptyClient = () => ({
  name:"",contact:"",phone:"",email:"",city:"",type:"Restaurant",
  planKey:"",costCentres:"1",startDate:"",billingCycle:"yearly",
  lastCheckin:"",nps:5,upsell:"",notes:"",health:"happy",owner:"Sagar (You)"
});

const HEALTH_OPTS = [
  {key:"happy",    label:"Happy",       color:"#3DD68C", bg:"rgba(61,214,140,.13)"},
  {key:"neutral",  label:"Neutral",     color:"#FFB020", bg:"rgba(255,176,32,.13)"},
  {key:"at_risk",  label:"At Risk",     color:"#FF4F4F", bg:"rgba(255,79,79,.13)"},
];

/* ─ Client Form (top-level, outside OnboardedView to prevent re-mount on every render) ─ */
const ClientForm = ({initial, onSave, onCancel}) => {
  const [f, setF]            = useState(initial || emptyClient());
  const [remindRenewal, setRemindRenewal] = useState(false);
  const [remindDays, setRemindDays]       = useState("7");
  const set = k => e => setF(p => ({...p, [k]: e.target.value}));
  const plan     = PLANS.find(p => p.key === f.planKey);
  const renewal  = computeRenewal(f.startDate, f.billingCycle);
  const annualRev = plan ? plan.price * (parseInt(f.costCentres) || 1) * 12 : 0;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>

      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--bdr)"}}>Client Information</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <Field label="Brand / Outlet Name" col="span 2"><Inp value={f.name} onChange={set("name")} placeholder="e.g. Le15 Patisserie"/></Field>
        <Field label="Contact Person"><Inp value={f.contact} onChange={set("contact")} placeholder="Key contact name"/></Field>
        <Field label="Phone / WhatsApp"><Inp value={f.phone} onChange={set("phone")} placeholder="+91 98XXX XXXXX"/></Field>
        <Field label="Email"><Inp value={f.email} onChange={set("email")} type="email" placeholder="email@brand.com"/></Field>
        <Field label="City"><Inp value={f.city} onChange={set("city")} placeholder="Mumbai"/></Field>
        <Field label="Outlet Type"><Sel value={f.type} onChange={set("type")}>{OUTLET_TYPES.map(t=><option key={t}>{t}</option>)}</Sel></Field>
        <Field label="Assigned To"><Sel value={f.owner} onChange={set("owner")}>{TEAM.map(t=><option key={t}>{t}</option>)}</Sel></Field>
      </div>

      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--bdr)"}}>Plan &amp; Billing</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <Field label="Plan" col="span 2">
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {PLANS.map(p=>(
              <button key={p.key} onClick={()=>setF(prev=>({...prev,planKey:p.key}))}
                style={{padding:"8px 12px",borderRadius:9,border:`1.5px solid ${f.planKey===p.key?(p.category==="Bar"?"var(--teal)":"var(--blue)"):"var(--bdr)"}`,
                  background:f.planKey===p.key?(p.category==="Bar"?"var(--teal-g)":"var(--blue-g)"):"var(--surf)",
                  textAlign:"left",cursor:"pointer",transition:"all .15s",minWidth:130}}>
                <div style={{fontSize:10,fontWeight:700,color:f.planKey===p.key?(p.category==="Bar"?"var(--teal)":"var(--sky)"):"var(--white)",marginBottom:2}}>{p.label}</div>
                <div style={{fontFamily:"var(--serif)",fontSize:14,color:f.planKey===p.key?"var(--teal)":"var(--body)"}}>₹{p.price.toLocaleString("en-IN")}<span style={{fontSize:9,color:"var(--muted)",fontFamily:"var(--sans)"}}>/mo</span></div>
                <div style={{fontSize:9,color:"var(--muted)"}}>{p.billing}</div>
              </button>
            ))}
          </div>
        </Field>
        <Field label="No. of Cost Centres"><Inp value={f.costCentres} onChange={set("costCentres")} type="number" min="1" placeholder="1"/></Field>
        <Field label="Billing Cycle">
          <Sel value={f.billingCycle} onChange={set("billingCycle")}>
            {BILLING_CYCLES.map(b=><option key={b.key} value={b.key}>{b.label}</option>)}
          </Sel>
        </Field>
        <Field label="Start / Onboarding Date"><Inp value={f.startDate} onChange={set("startDate")} type="date"/></Field>
        <Field label="Next Renewal (auto-calculated)">
          <div style={{...IS,color:renewal?"var(--teal)":"var(--muted)",fontStyle:renewal?"normal":"italic"}}>
            {renewal ? fmtDate(renewal) : "Set start date & billing cycle"}
          </div>
        </Field>
        {annualRev>0&&<Field label="Annual Contract Value" col="span 2">
          <div style={{...IS,fontFamily:"var(--serif)",fontSize:16,color:"var(--teal)",pointerEvents:"none"}}>₹{annualRev.toLocaleString("en-IN")} / year</div>
        </Field>}
      </div>

      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--bdr)"}}>Health &amp; Retention</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <Field label="Client Health">
          <div style={{display:"flex",gap:8,marginTop:2}}>
            {HEALTH_OPTS.map(h=>(
              <button key={h.key} onClick={()=>setF(p=>({...p,health:h.key}))}
                style={{flex:1,padding:"8px 6px",borderRadius:8,border:`1.5px solid ${f.health===h.key?h.color:"var(--bdr)"}`,
                  background:f.health===h.key?h.bg:"transparent",color:f.health===h.key?h.color:"var(--muted)",
                  fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s",textAlign:"center"}}>
                {h.label}

        </Field>

          <div style={{display:"flex",gap:6,marginTop:2}}>
            {[1,2,3,4,5].map(n=>(
              <button key={n} onClick={()=>setF(p=>({...p,nps:n}))}
                style={{flex:1,height:36,borderRadius:8,border:`1.5px solid ${f.nps>=n?"var(--amber)":"var(--bdr)"}`,

                  fontWeight:700,cursor:"pointer",fontSize:14}}>
                {n}
              </button>
            ))}
          </div>
        </Field>
        <Field label="Last Check-in Date"><Inp value={f.lastCheckin} onChange={set("lastCheckin")} type="date"/></Field>
        <Field label="Upsell Opportunity"><Inp value={f.upsell} onChange={set("upsell")} placeholder="e.g. Bar module, extra cost centres"/></Field>
        <Field label="Notes" col="span 2"><Tex value={f.notes} onChange={set("notes")} placeholder="Feedback, issues, wins, anything important…" style={{minHeight:60}}/></Field>
      </div>

      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--bdr)"}}>Renewal Reminder</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13,color:"var(--body)"}}>
          <input type="checkbox" checked={remindRenewal} onChange={e=>setRemindRenewal(e.target.checked)}
            style={{width:16,height:16,accentColor:"var(--teal)",cursor:"pointer"}}/>

        {remindRenewal && (
          <div style={{display:"flex",alignItems:"center",gap:10,paddingLeft:26,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"var(--muted)"}}>Notify me</span>
            <Sel value={remindDays} onChange={e=>setRemindDays(e.target.value)} style={{width:"auto",minWidth:130}}>
              <option value="1">1 day before</option>
              <option value="3">3 days before</option>
              <option value="7">7 days before</option>
              <option value="14">14 days before</option>
              <option value="30">30 days before</option>

            <span style={{fontSize:12,color:"var(--muted)"}}>renewal{renewal ? ` (➔ ${fmtDate(renewal)})` : " (set start date first)"}</span>

      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:4}}>
        <Btn onClick={onCancel}>Cancel</Btn>
        <Btn variant="primary" onClick={()=>{
          if(!f.name.trim()) return;
          if(remindRenewal && renewal){
            const allRem = JSON.parse(localStorage.getItem('crm_lead_reminders')||'{}');
            const remDate = new Date(renewal);
            remDate.setDate(remDate.getDate() - parseInt(remindDays));
            const key = 'client_' + (f.name.trim().replace(/\s+/g,'_')) + '_' + Date.now();
            allRem[key] = [{
              id: Date.now(),
              title: '🔄 Renewal: ' + f.name.trim(),
              datetime: remDate.toISOString().slice(0,16),
              notifyBefore: 0,
              fired: false
            }];
            localStorage.setItem('crm_lead_reminders', JSON.stringify(allRem));
          }
          onSave(f);
        }}>Save Client</Btn>
      </div>
    </div>
  );
};

const OnboardedView = ({renewalNotifDismissed, setRenewalNotifDismissed, bulkOpen, setBulkOpen}) => {
  const [clients,setClients]   = useState([]);
  const [addOpen,setAddOpen]   = useState(false);
  const [editC,setEditC]       = useState(null);
  const [detailC,setDetailC]   = useState(null);
  const [toast,setToast]       = useState("");
  const [search,setSearch]     = useState("");
  const [fHealth,setFHealth]   = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3200); };

  const fetchClients = () => {
    if(!getToken()) return;
    fetch(API_BASE+'/api/clients?size=200', {headers: authHeaders()})
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d && d.content) setClients(d.content); })
      .catch(()=>{});
  };

  // Fetch clients from backend on mount
  useEffect(()=>{ fetchClients(); },[]);

  // Listen for bulk import events from BulkModal (triggered from LeadsView)
  useEffect(()=>{
    const handler = e => { fetchClients(); showToast(`✓ ${e.detail?.count ?? 0} clients imported successfully`); };
    window.addEventListener('clients-imported', handler);
    return () => window.removeEventListener('clients-imported', handler);
  },[]);

  // Compute renewal and days-to-renewal for a client
  const getRenewal = c => {
    const date = computeRenewal(c.startDate, c.billingCycle);
    if(!date) return {date:"",days:null};
    const days = Math.ceil((new Date(date+"T00:00:00") - new Date()) / (1000*60*60*24));
    return {date, days};
  };

  const daysCheckin = c => c.lastCheckin
    ? Math.floor((new Date()-new Date(c.lastCheckin+"T00:00:00"))/(1000*60*60*24))
    : null;

  // Clients needing renewal call (≤10 days to renewal, not dismissed)
  const renewalAlerts = clients.filter(c=>{
    const {days} = getRenewal(c);
    return days!==null && days<=10 && days>=0 && !renewalNotifDismissed.includes(c.id);
  });

  const filtered = clients.filter(c=>
    (!fHealth || c.health===fHealth) &&
    (!search  || c.name.toLowerCase().includes(search.toLowerCase()) || c.contact.toLowerCase().includes(search.toLowerCase()))
  );

  const saveClient = async f => {
    const url  = editC ? API_BASE+'/api/clients/'+editC.id : API_BASE+'/api/clients';
    const meth = editC ? 'PUT' : 'POST';
    try {
      const r = await fetch(url, {method:meth, headers:authHeaders(), body:JSON.stringify({...f,nps:parseInt(f.nps)||5,costCentres:parseInt(f.costCentres)||1})});
      if(r.ok){
        const saved = await r.json();
        if(editC){ setClients(prev=>prev.map(c=>c.id===editC.id?saved:c)); showToast("✓ Client updated"); }
        else      { setClients(prev=>[saved,...prev]); showToast("✓ Client added"); }
        if(detailC && editC && detailC.id===editC.id) setDetailC(saved);
      } else { showToast("Failed to save client — check connection"); }
    } catch(e) { showToast("Connection error — is the server running?"); }
    setAddOpen(false); setEditC(null);
  };

  const logCheckin = async id => {
    try {
      const r = await fetch(API_BASE+'/api/clients/'+id+'/checkin', {method:'POST', headers:authHeaders()});
      if(r.ok){
        const saved = await r.json();
        setClients(prev=>prev.map(c=>c.id===id?saved:c));
        if(detailC && detailC.id===id) setDetailC(saved);
      }
    } catch(e) {}
    showToast("✓ Check-in logged for today");
  };

  // Stats
  const avgNps = clients.length ? (clients.reduce((s,c)=>s+(parseInt(c.nps)||0),0)/clients.length).toFixed(1) : "—";
  const renewingSoon = clients.filter(c=>{ const {days}=getRenewal(c); return days!==null&&days<=30&&days>=0; }).length;
  const atRisk       = clients.filter(c=>c.health==="at_risk").length;
  const needsCall    = clients.filter(c=>{ const dc=daysCheckin(c); return dc===null||dc>30; }).length;


  /* ─ Client Detail Panel ─ */
  const ClientDetailPanel = ({client,onClose,onEdit}) => {
    if(!client) return null;
    const plan    = PLANS.find(p=>p.key===client.planKey);
    const {date:renewDate, days:renewDays} = getRenewal(client);
    const dc      = daysCheckin(client);
    const health  = HEALTH_OPTS.find(h=>h.key===client.health)||HEALTH_OPTS[0];
    const annualRev = plan ? plan.price*(parseInt(client.costCentres)||1)*12 : 0;
    const renewAlert = renewDays!==null && renewDays<=10 && renewDays>=0;

    const DRow = ({label,value,accent}) => (
      <div style={{padding:"9px 0",borderBottom:"1px solid var(--bdr)"}}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",marginBottom:3}}>{label}</div>
        <div style={{fontSize:13,color:accent||"var(--white)",wordBreak:"break-word"}}>{value||<span style={{color:"var(--muted)",fontStyle:"italic"}}>Not set</span>}</div>
      </div>
    );

    return (
      <>
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(6,8,18,.55)",backdropFilter:"blur(4px)",zIndex:450}}/>
        <div style={{position:"fixed",top:0,right:0,bottom:0,width:420,maxWidth:"95vw",background:"var(--card)",borderLeft:"1px solid var(--bdr)",zIndex:460,overflowY:"auto",display:"flex",flexDirection:"column",animation:"slideIn .25s ease"}}>

          {/* Header */}
          <div style={{padding:"20px 24px 16px",borderBottom:"1px solid var(--bdr)",position:"sticky",top:0,background:"var(--card)",zIndex:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1,minWidth:0,paddingRight:10}}>
                <div style={{fontFamily:"var(--serif)",fontSize:18,fontWeight:700,color:"var(--white)",lineHeight:1.2,marginBottom:4}}>{client.name}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>{client.type} · {client.city||"—"}</div>
              </div>
              <button onClick={onClose} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:7,width:28,height:28,cursor:"pointer",color:"var(--muted)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <span style={{background:health.bg,color:health.color,padding:"3px 10px",borderRadius:100,fontSize:10,fontWeight:700}}>{health.label}</span>
              {plan&&<span style={{background:"var(--blue-g)",color:"var(--sky)",padding:"3px 10px",borderRadius:100,fontSize:10,fontWeight:600}}>{plan.label}</span>}
              {annualRev>0&&<span style={{fontFamily:"var(--serif)",fontSize:14,fontWeight:700,color:"var(--teal)"}}>₹{(annualRev/100000).toFixed(1)}L/yr</span>}
            </div>
            {renewAlert&&<div style={{marginTop:10,background:"rgba(255,79,79,.1)",border:"1px solid var(--red)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--red)",fontWeight:600}}>
              🔔 Renewal in {renewDays} day{renewDays!==1?"s":""} — call them before it's due!
            </div>}
          </div>

          <div style={{padding:"18px 24px",flex:1}}>
            {/* Contact */}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:2,paddingBottom:8,borderBottom:"1px solid var(--bdr)",marginTop:0}}>Contact</div>
            <DRow label="Contact Person"  value={client.contact}/>
            <DRow label="Phone"           value={client.phone}  accent="var(--sky)"/>
            <DRow label="Email"           value={client.email}  accent="var(--sky)"/>
            <DRow label="Assigned To"     value={client.owner}/>

            {/* Billing */}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:2,paddingBottom:8,borderBottom:"1px solid var(--bdr)",marginTop:16}}>Plan & Billing</div>
            <DRow label="Plan"            value={plan?`${plan.label} — ₹${plan.price.toLocaleString("en-IN")}/mo/cost centre`:client.planKey} accent="var(--sky)"/>
            <DRow label="Cost Centres"    value={client.costCentres}/>
            <DRow label="Billing Cycle"   value={BILLING_CYCLES.find(b=>b.key===client.billingCycle)?.label}/>
            <DRow label="Start Date"      value={fmtDate(client.startDate)}/>
            <DRow label="Next Renewal"    value={renewDate ? `${fmtDate(renewDate)} ${renewDays!==null?`(${renewDays} days)`:""}`:"—"} accent={renewDays!==null&&renewDays<=10?"var(--red)":renewDays!==null&&renewDays<=30?"var(--amber)":"var(--body)"}/>
            <DRow label="Annual Value"    value={annualRev>0?`₹${annualRev.toLocaleString("en-IN")} / year`:"—"} accent="var(--teal)"/>

            {/* Health */}
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--teal)",marginBottom:2,paddingBottom:8,borderBottom:"1px solid var(--bdr)",marginTop:16}}>Health & Retention</div>
            <DRow label="NPS / Satisfaction" value={`${client.nps} / 5 ${"★".repeat(client.nps)}${"☆".repeat(5-client.nps)}`} accent={client.nps>=4?"var(--teal)":client.nps>=3?"var(--amber)":"var(--red)"}/>
            <div style={{padding:"9px 0",borderBottom:"1px solid var(--bdr)"}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Last Check-in</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,color:dc===null||dc>30?"var(--red)":dc>14?"var(--amber)":"var(--teal)",fontWeight:600}}>
                  {dc===null?"Never":dc===0?"Today":dc===1?"Yesterday":`${dc} days ago`}
                </span>
                <button onClick={()=>logCheckin(client.id)}
                  style={{padding:"3px 10px",background:"var(--teal-g)",border:"1px solid var(--teal)",borderRadius:6,color:"var(--teal)",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  ✓ Log Today
                </button>
              </div>
            </div>
            {client.upsell&&<DRow label="Upsell Opportunity" value={client.upsell} accent="var(--purple)"/>}
            {client.notes&&<DRow label="Notes" value={client.notes}/>}
          </div>

          <div style={{padding:"14px 24px",borderTop:"1px solid var(--bdr)",display:"flex",gap:10,background:"var(--card)",position:"sticky",bottom:0}}>
            <Btn variant="primary" onClick={()=>onEdit(client)} style={{flex:1}}>✏ Edit Client</Btn>
            <Btn onClick={onClose} style={{flex:1}}>Close</Btn>
          </div>
        </div>
        <style>{`@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}`}</style>
      </>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"var(--teal)",color:"#042a22",padding:"10px 20px",borderRadius:10,fontWeight:600,fontSize:13,zIndex:600,animation:"up .2s ease",boxShadow:"0 6px 24px rgba(0,0,0,.35)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Renewal alert banners — 10 days before renewal */}
      {renewalAlerts.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {renewalAlerts.map(c=>{
            const {days} = getRenewal(c);
            const plan   = PLANS.find(p=>p.key===c.planKey);
            return (
              <div key={c.id} style={{background:"rgba(255,79,79,.07)",border:"1px solid var(--red)",borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",transition:"background .15s"}}
                onClick={()=>setDetailC(c)}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,79,79,.12)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(255,79,79,.07)"}>
                <span style={{fontSize:22,animation:"ring 2s ease infinite"}}>🔔</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:700,color:"var(--red)",marginBottom:2}}>
                    RENEWAL IN {days} DAY{days!==1?"S":""} — Call now to ensure renewal
                  </div>
                  <div style={{fontSize:13,color:"var(--white)",fontWeight:600}}>{c.name}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>{c.contact} · {plan?.label||""} · {BILLING_CYCLES.find(b=>b.key===c.billingCycle)?.label}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontFamily:"var(--serif)",fontSize:18,color:"var(--teal)"}}>
                    {plan ? `₹${(plan.price*(parseInt(c.costCentres)||1)*12/100000).toFixed(1)}L` : "—"}
                  </div>
                  <div style={{fontSize:9,color:"var(--muted)"}}>annual value</div>
                </div>
                <button onClick={e=>{e.stopPropagation();setRenewalNotifDismissed(p=>[...p,c.id]);}}
                  style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted)",fontSize:14,flexShrink:0,padding:"2px 4px"}}
                  onMouseEnter={e=>e.currentTarget.style.color="var(--white)"}
                  onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>✕</button>
              </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>

          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Track renewals, health & retention for every active client</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients…" style={{width:180}}/>
          <Sel value={fHealth} onChange={e=>setFHealth(e.target.value)} style={{width:"auto",padding:"7px 10px"}}>
            <option value="">All Health</option>
            {HEALTH_OPTS.map(h=><option key={h.key} value={h.key}>{h.label}</option>)}

        <StatCard label="Renewing Soon"    value={renewingSoon} sub="Within 30 days" icon="📅" accent="var(--red)"/>
        <StatCard label="Needs Check-in"   value={needsCall}    sub="No contact 30d+"icon="📞" accent="var(--purple)"/>
      </div>

      {/* Client table */}
      <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,overflow:"hidden"}}>

        <div style={{overflowX:"auto"}}>

                      </div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{c.type} · {c.city||"—"}</div>
                    </td>

                    <td style={{padding:"11px 14px"}}>
                      <div style={{fontSize:12,color:"var(--body)"}}>{c.contact||"—"}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{c.phone||"—"}</div>
                    </td>

                    <td style={{padding:"11px 14px"}}>
                      <div style={{fontSize:11,fontWeight:600,color:"var(--sky)"}}>{plan?.label||"—"}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{c.costCentres} cost centre{c.costCentres>1?"s":""}</div>

                      {BILLING_CYCLES.find(b=>b.key===c.billingCycle)?.label||"—"}
                    </td>

                    <td style={{padding:"11px 14px",whiteSpace:"nowrap"}}>
                      {rDate ? (
                        <div>
                          <div style={{fontSize:11,fontWeight:600,color:renewUrgent?"var(--red)":renewSoon?"var(--amber)":"var(--body)"}}>{fmtDate(rDate)}</div>

                    </td>

                    <td style={{padding:"11px 14px",whiteSpace:"nowrap"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,fontWeight:500,color:checkinNeeded?"var(--red)":dc<=7?"var(--teal)":"var(--amber)"}}>
                          {dc===null?"Never":dc===0?"Today":dc===1?"Yesterday":`${dc}d ago`}

                        <button title="Log check-in as today"
                          onClick={e=>{e.stopPropagation();logCheckin(c.id);}}
                          style={{width:20,height:20,borderRadius:5,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",flexShrink:0}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--teal)";e.currentTarget.style.color="var(--teal)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.color="var(--muted)";}}>✓</button>
                      </div>
                    </td>

                    <td style={{padding:"11px 14px"}}>
                      <span style={{background:health.bg,color:health.color,padding:"2px 9px",borderRadius:100,fontSize:10,fontWeight:700}}>{health.label}</span>
                    </td>

                    <td style={{padding:"11px 14px"}}>
                      <div style={{display:"flex",gap:6}}>
                        <button title="Edit" onClick={e=>{e.stopPropagation();setEditC(c);setDetailC(null);setAddOpen(true);}}
                          style={{width:26,height:26,borderRadius:6,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--blue)";e.currentTarget.style.background="var(--blue-g)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.background="var(--surf)";}}>✏</button>
                        <button title="Delete" onClick={async e=>{e.stopPropagation();try{await fetch(API_BASE+'/api/clients/'+c.id,{method:'DELETE',headers:authHeaders()});}catch(e2){}setClients(p=>p.filter(x=>x.id!==c.id));if(isSelected)setDetailC(null);showToast("Client removed");}}
                          style={{width:26,height:26,borderRadius:6,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}
                          onMouseEnter={e=>{e.stopPropagation();e.currentTarget.style.borderColor="var(--red)";e.currentTarget.style.background="var(--red-g)";}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.background="var(--surf)";}}>🗑</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Modals */}
      <Modal open={addOpen} onClose={()=>{setAddOpen(false);setEditC(null);}} title={editC?"Edit Client":"Add Onboarded Client"} width={640}>
        <ClientForm initial={editC} onSave={saveClient} onCancel={()=>{setAddOpen(false);setEditC(null);}}/>
      </Modal>

      {/* Detail panel */}
      <ClientDetailPanel
        client={detailC}
        onClose={()=>setDetailC(null)}
        onEdit={c=>{setDetailC(null);setEditC(c);setAddOpen(true);}}
      />

      {/* Bulk import — pre-selected to Onboarded Clients */}
      <BulkModal
        open={bulkOpen}
        onClose={()=>setBulkOpen(false)}
        defaultDest="onboarded"
        onImport={(newItems, dest)=>{
          setClients(prev=>[...newItems,...prev]);
          setBulkOpen(false);
          showToast(`✓ ${newItems.length} client${newItems.length!==1?"s":""} imported`);
        }}
      />
    </div>
  );
};


/* ── NOTES & REMINDERS VIEW ────────────────────── */
const NOTE_COLORS = [
  {key:"default", bg:"var(--card)",    border:"var(--bdr)",              label:"Default"},
  {key:"yellow",  bg:"rgba(255,176,32,.08)", border:"rgba(255,176,32,.35)", label:"Yellow"},
  {key:"blue",    bg:"rgba(61,111,255,.08)", border:"rgba(61,111,255,.35)", label:"Blue"},
  {key:"green",   bg:"rgba(61,214,140,.08)", border:"rgba(61,214,140,.35)", label:"Green"},
  {key:"red",     bg:"rgba(255,79,79,.08)",  border:"rgba(255,79,79,.35)",  label:"Red"},
  {key:"purple",  bg:"rgba(159,122,255,.08)",border:"rgba(159,122,255,.35)",label:"Purple"},
];
const NOTE_COLOR_TEXT = {default:"var(--white)",yellow:"var(--amber)",blue:"var(--sky)",green:"var(--teal)",red:"var(--red)",purple:"var(--purple)"};

const SEED_NOTES = [
  {id:201,type:"note",  color:"yellow", title:"AAHAR Follow-up Priority", body:"Call all AAHAR leads within 7 days. Strike while the iron is hot — they met us in person.", pinned:true,  createdAt:today(), reminder:""},
  {id:202,type:"todo",  color:"default",title:"This Week Tasks",          body:"",  pinned:false, createdAt:today(), reminder:"",
    todos:[
      {id:"t1",text:"Follow up Farzi Cafe proposal",done:false},
      {id:"t2",text:"Demo prep for Box8 Kitchens",done:false},
      {id:"t3",text:"Check in with Le15 Patisserie",done:true},
      {id:"t4",text:"Send AAHAR leads WhatsApp intro",done:false},
    ]},
  {id:203,type:"note",  color:"blue",  title:"Objection Handling — Price", body:"When client says too expensive:\n→ Ask: what is your monthly wastage cost?\n→ 20% COGS saving on ₹10L revenue = ₹2L saved\n→ Barometer costs ₹2,500–₹6,000/mo\nROI is obvious.", pinned:true, createdAt:today(), reminder:""},
];

let _nid = 210;
const nuid = () => ++_nid;

const NotesView = () => {
  const [notes,setNotes]     = useState(SEED_NOTES);
  const [addOpen,setAddOpen] = useState(false);
  const [editNote,setEditNote]= useState(null);
  const [search,setSearch]   = useState("");
  const [fType,setFType]     = useState("");
  const [toast,setToast]     = useState("");

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3000); };

  const filtered = notes.filter(n=>
    (!fType || n.type===fType) &&
    (!search || n.title.toLowerCase().includes(search.toLowerCase()) || (n.body||"").toLowerCase().includes(search.toLowerCase()))
  ).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));

  const deleteNote = id => { setNotes(p=>p.filter(n=>n.id!==id)); showToast("Deleted"); };
  const togglePin  = id => { setNotes(p=>p.map(n=>n.id===id?{...n,pinned:!n.pinned}:n)); };
  const toggleTodo = (nid,tid) => {
    setNotes(p=>p.map(n=>n.id===nid?{...n,todos:n.todos.map(t=>t.id===tid?{...t,done:!t.done}:t)}:n));
  };

  const saveNote = f => {
    if(editNote) { setNotes(p=>p.map(n=>n.id===editNote.id?{...n,...f}:n)); showToast("✓ Saved"); }
    else          { setNotes(p=>[{...f,id:nuid(),createdAt:today(),pinned:false},...p]); showToast("✓ Added"); }
    setAddOpen(false); setEditNote(null);
  };

  // Reminder check — respects per-note notifyBefore (minutes)
  useEffect(()=>{
    const check = () => {
      const now = new Date();
      if(Notification.permission!=="granted") return;
      notes.forEach(n=>{
        if(!n.reminder) return;
        const [date,time] = n.reminder.split("T");
        if(!date||!time) return;
        const [h,m] = time.split(":").map(Number);
        const due = new Date(date+"T00:00:00");
        due.setHours(h,m,0,0);
        // notifyBefore: how many minutes BEFORE due to fire the notification
        const offsetMs = (n.notifyBefore||0)*60000;
        const fireAt = new Date(due.getTime() - offsetMs);
        const diff = now.getTime() - fireAt.getTime();
        if(diff>=0&&diff<=90000){
          playReminderSound();
          const label = n.notifyBefore>0 ? `in ${n.notifyBefore>=60?Math.round(n.notifyBefore/60)+"h":n.notifyBefore+"min"}` : "now";
          new Notification("⏰ Reminder — Barometer CRM",{body:`${n.title} (due ${label})`,tag:"note-"+n.id+"-"+fireAt.getTime(),requireInteraction:true});
        }
      });
    };
    check();
    const t = setInterval(check,30000);
    return ()=>clearInterval(t);
  },[notes]);

  /* ── Note Form ── */
  const NoteForm = ({initial,onSave,onCancel}) => {
    const empty = {type:"note",color:"default",title:"",body:"",reminder:"",todos:[{id:"t"+Date.now(),text:"",done:false}]};
    const [f,setF] = useState(initial||empty);
    const set = k => e => setF(p=>({...p,[k]:e.target.value}));

    const addTodo   = () => setF(p=>({...p,todos:[...p.todos,{id:"t"+Date.now(),text:"",done:false}]}));
    const editTodo  = (id,text) => setF(p=>({...p,todos:p.todos.map(t=>t.id===id?{...t,text}:t)}));
    const removeTodo= id => setF(p=>({...p,todos:p.todos.filter(t=>t.id!==id)}));

    const col = NOTE_COLORS.find(c=>c.key===f.color)||NOTE_COLORS[0];
    return (
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Type toggle */}
        <div style={{display:"flex",gap:8}}>
          {[{k:"note",icon:"📝",l:"Note"},{k:"todo",icon:"✅",l:"To-do List"},{k:"reminder",icon:"⏰",l:"Reminder"}].map(t=>(
            <button key={t.k} onClick={()=>setF(p=>({...p,type:t.k}))}
              style={{flex:1,padding:"8px",borderRadius:8,border:`1.5px solid ${f.type===t.k?"var(--blue)":"var(--bdr)"}`,
                background:f.type===t.k?"var(--blue-g)":"transparent",color:f.type===t.k?"var(--sky)":"var(--muted)",
                cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              <span>{t.icon}</span>{t.l}
            </button>
          ))}
        </div>

        {/* Title */}
        <div>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>Title</div>
          <Inp value={f.title} onChange={set("title")} placeholder="Note title…"/>
        </div>

        {/* Body — only for note/reminder */}
        {f.type!=="todo"&&(
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>Content</div>
            <Tex value={f.body} onChange={set("body")} placeholder="Write your note here…" style={{minHeight:100}}/>
          </div>
        )}

        {/* Todo items */}
        {f.type==="todo"&&(
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Tasks</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {f.todos.map((t,i)=>(
                <div key={t.id} style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:"var(--muted)",fontSize:11,width:16,flexShrink:0}}>{i+1}.</span>
                  <Inp value={t.text} onChange={e=>editTodo(t.id,e.target.value)} placeholder="Task…" style={{flex:1}}/>
                  <button onClick={()=>removeTodo(t.id)} style={{width:26,height:26,borderRadius:6,border:"1px solid var(--bdr)",background:"var(--surf)",cursor:"pointer",color:"var(--muted)",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}
                    onMouseEnter={e=>e.currentTarget.style.color="var(--red)"}
                    onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>✕</button>
                </div>
              ))}
              <button onClick={addTodo} style={{padding:"6px",borderRadius:7,border:"1px dashed var(--bdr)",background:"transparent",color:"var(--muted)",cursor:"pointer",fontSize:11,marginTop:2}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--blue)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--bdr)"}>+ Add task</button>
            </div>
            {/* Reminder + notify for todo */}
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--bdr)"}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>⏰ Due date &amp; reminder</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <Inp type="date" value={f.reminder?f.reminder.split("T")[0]:""} onChange={e=>setF(p=>({...p,reminder:e.target.value+"T"+(p.reminder?p.reminder.split("T")[1]||"09:00":"09:00")}))} placeholder="Due date (optional)"/>
                <Inp type="time" value={f.reminder?f.reminder.split("T")[1]||"09:00":"09:00"} onChange={e=>setF(p=>({...p,reminder:(p.reminder?p.reminder.split("T")[0]:today())+"T"+e.target.value}))}/>
              </div>
              {f.reminder&&(
                <div style={{marginTop:8}}>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>🔔 Notify me</div>
                  <Sel value={f.notifyBefore||0} onChange={e=>setF(p=>({...p,notifyBefore:parseInt(e.target.value)}))} style={{width:"100%"}}>
                    <option value={0}>At reminder time</option>
                    <option value={5}>5 minutes before</option>
                    <option value={10}>10 minutes before</option>
                    <option value={15}>15 minutes before</option>
                    <option value={30}>30 minutes before</option>
                    <option value={60}>1 hour before</option>
                    <option value={120}>2 hours before</option>
                    <option value={480}>8 hours before</option>
                    <option value={1440}>1 day before</option>
                  </Sel>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Reminder datetime */}
        {(f.type==="reminder"||f.type==="note")&&(
          <div>
            <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>
              Reminder {f.type==="note"?"(optional)":""}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Inp type="date" value={f.reminder?f.reminder.split("T")[0]:""} onChange={e=>setF(p=>({...p,reminder:e.target.value+"T"+(p.reminder?p.reminder.split("T")[1]||"09:00":"09:00")}))}/>
              <Inp type="time" value={f.reminder?f.reminder.split("T")[1]||"09:00":"09:00"} onChange={e=>setF(p=>({...p,reminder:(p.reminder?p.reminder.split("T")[0]:today())+"T"+e.target.value}))}/>
            </div>
            {f.reminder&&(
              <div style={{marginTop:8}}>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>🔔 Notify me</div>
                <Sel value={f.notifyBefore||0} onChange={e=>setF(p=>({...p,notifyBefore:parseInt(e.target.value)}))} style={{width:"100%"}}>
                  <option value={0}>At reminder time</option>
                  <option value={5}>5 minutes before</option>
                  <option value={10}>10 minutes before</option>
                  <option value={15}>15 minutes before</option>
                  <option value={30}>30 minutes before</option>
                  <option value={60}>1 hour before</option>
                  <option value={120}>2 hours before</option>
                  <option value={480}>8 hours before</option>
                  <option value={1440}>1 day before</option>
                </Sel>
                <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>⚡ Browser must allow notifications — enable in Settings → Notifications</div>
              </div>
            )}
          </div>
        )}

        {/* Color */}
        <div>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:7}}>Card Color</div>
          <div style={{display:"flex",gap:7}}>
            {NOTE_COLORS.map(c=>(
              <button key={c.key} onClick={()=>setF(p=>({...p,color:c.key}))}
                title={c.label}
                style={{width:26,height:26,borderRadius:7,background:c.bg,border:`2px solid ${f.color===c.key?NOTE_COLOR_TEXT[c.key]||"var(--white)":c.border}`,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {f.color===c.key&&<div style={{width:8,height:8,borderRadius:"50%",background:NOTE_COLOR_TEXT[c.key]||"var(--white)"}}/>}
              </button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:4}}>
          <Btn onClick={onCancel}>Cancel</Btn>
          <Btn variant="primary" onClick={()=>{if(!f.title.trim())return;onSave(f);}}>Save</Btn>
        </div>
      </div>
    );
  };

  const doneCount   = n => n.todos ? n.todos.filter(t=>t.done).length : 0;
  const totalCount  = n => n.todos ? n.todos.length : 0;
  const hasReminder = n => n.reminder && n.reminder.split("T")[0] >= today();

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"var(--teal)",color:"#042a22",padding:"10px 20px",borderRadius:10,fontWeight:600,fontSize:13,zIndex:600,animation:"up .2s ease",boxShadow:"0 6px 24px rgba(0,0,0,.35)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"var(--serif)",fontSize:21,fontWeight:700,color:"var(--white)"}}>Notes &amp; <span style={{color:"var(--purple)"}}>Reminders</span></div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Your personal workspace — notes, to-dos and reminders</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search notes…" style={{width:180}}/>
          <Sel value={fType} onChange={e=>setFType(e.target.value)} style={{width:"auto",padding:"7px 10px"}}>
            <option value="">All Types</option>
            <option value="note">📝 Notes</option>
            <option value="todo">✅ To-dos</option>
            <option value="reminder">⏰ Reminders</option>
          </Sel>
          <Btn variant="primary" onClick={()=>{setEditNote(null);setAddOpen(true);}}>+ New</Btn>
        </div>
      </div>

      {/* Stats row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
        <StatCard label="Total Notes"    value={notes.length}                                        icon="📝" accent="var(--purple)"/>
        <StatCard label="To-do Lists"    value={notes.filter(n=>n.type==="todo").length}              icon="✅" accent="var(--teal)"/>
        <StatCard label="Reminders Set"  value={notes.filter(n=>hasReminder(n)).length}              icon="⏰" accent="var(--amber)"/>
        <StatCard label="Pinned"         value={notes.filter(n=>n.pinned).length}                    icon="📌" accent="var(--blue)"/>
      </div>

      {/* Notes grid */}
      {filtered.length===0&&(
        <div style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:12,padding:"48px 24px",textAlign:"center",color:"var(--muted)"}}>
          <div style={{fontSize:32,marginBottom:10}}>📝</div>
          <div style={{fontSize:14,fontWeight:600,color:"var(--white)",marginBottom:6}}>No notes yet</div>
          <div style={{fontSize:12,marginBottom:16}}>Add your first note, to-do or reminder</div>
          <Btn variant="primary" onClick={()=>setAddOpen(true)}>+ New Note</Btn>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,alignItems:"start"}}>
        {filtered.map(n=>{
          const col   = NOTE_COLORS.find(c=>c.key===n.color)||NOTE_COLORS[0];
          const tCol  = NOTE_COLOR_TEXT[n.color]||"var(--white)";
          const done  = doneCount(n);
          const total = totalCount(n);
          const pct   = total>0?Math.round(done/total*100):0;
          const remDue = n.reminder && n.reminder.split("T")[0] < today();
          return (
            <div key={n.id} style={{background:col.bg,border:`1px solid ${n.pinned?"var(--blue)":col.border}`,borderRadius:14,padding:"16px 18px",position:"relative",transition:"transform .15s,box-shadow .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(0,0,0,.3)";}}
              onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>

              {/* Top actions */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  <span style={{fontSize:13}}>{n.type==="todo"?"✅":n.type==="reminder"?"⏰":"📝"}</span>
                  {n.pinned&&<span title="Pinned" style={{fontSize:11}}>📌</span>}
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button title={n.pinned?"Unpin":"Pin"} onClick={()=>togglePin(n.id)}
                    style={{width:22,height:22,borderRadius:5,border:"1px solid var(--bdr)",background:"transparent",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)"}}
                    onMouseEnter={e=>e.currentTarget.style.color="var(--amber)"}
                    onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>📌</button>
                  <button title="Edit" onClick={()=>{setEditNote(n);setAddOpen(true);}}
                    style={{width:22,height:22,borderRadius:5,border:"1px solid var(--bdr)",background:"transparent",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)"}}
                    onMouseEnter={e=>e.currentTarget.style.color="var(--sky)"}
                    onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>✏</button>
                  <button title="Delete" onClick={()=>deleteNote(n.id)}
                    style={{width:22,height:22,borderRadius:5,border:"1px solid var(--bdr)",background:"transparent",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)"}}
                    onMouseEnter={e=>e.currentTarget.style.color="var(--red)"}
                    onMouseLeave={e=>e.currentTarget.style.color="var(--muted)"}>🗑</button>
                </div>
              </div>

              {/* Title */}
              <div style={{fontFamily:"var(--serif)",fontSize:14,fontWeight:700,color:tCol,marginBottom:8,lineHeight:1.3}}>{n.title}</div>

              {/* Body */}
              {n.type==="note"&&n.body&&(
                <div style={{fontSize:12,color:"var(--body)",lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:8}}>{n.body}</div>
              )}

              {/* Todo items */}
              {n.type==="todo"&&n.todos&&(
                <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:8}}>
                  {n.todos.map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:8,cursor:"pointer"}} onClick={()=>toggleTodo(n.id,t.id)}>
                      <div style={{width:16,height:16,borderRadius:4,border:`1.5px solid ${t.done?"var(--teal)":"var(--bdr)"}`,background:t.done?"var(--teal)":"transparent",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                        {t.done&&<span style={{fontSize:9,color:"#042a22",fontWeight:700}}>✓</span>}
                      </div>
                      <span style={{fontSize:12,color:t.done?"var(--muted)":"var(--body)",textDecoration:t.done?"line-through":"none",lineHeight:1.4,flex:1}}>{t.text}</span>
                    </div>
                  ))}
                  {/* Progress bar */}
                  {total>0&&(
                    <div style={{marginTop:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:9,color:"var(--muted)"}}>{done}/{total} done</span>
                        <span style={{fontSize:9,color:pct===100?"var(--teal)":"var(--muted)"}}>{pct}%</span>
                      </div>
                      <div style={{height:3,borderRadius:2,background:"var(--bdr)"}}>
                        <div style={{height:"100%",borderRadius:2,background:pct===100?"var(--teal)":"var(--blue)",width:`${pct}%`,transition:"width .3s"}}/>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Reminder */}
              {n.reminder&&(
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6,padding:"5px 9px",borderRadius:7,background:remDue?"rgba(255,79,79,.1)":"rgba(159,122,255,.1)",border:`1px solid ${remDue?"var(--red)":"rgba(159,122,255,.3)"}`}}>
                  <span style={{fontSize:11}}>{remDue?"⚠":"⏰"}</span>
                  <span style={{fontSize:10,color:remDue?"var(--red)":"var(--purple)",fontWeight:600}}>
                    {remDue?"Overdue: ":""}{n.reminder.split("T")[0]} at {n.reminder.split("T")[1]||""}
                  </span>
                </div>
              )}

              {/* Date */}
              <div style={{fontSize:9,color:"var(--muted)",marginTop:10,letterSpacing:".04em"}}>{fmtDate(n.createdAt)}</div>
            </div>
          );
        })}
      </div>

      <Modal open={addOpen} onClose={()=>{setAddOpen(false);setEditNote(null);}} title={editNote?"Edit":"New Note / To-do / Reminder"} width={520}>
        <NoteForm initial={editNote} onSave={saveNote} onCancel={()=>{setAddOpen(false);setEditNote(null);}}/>
      </Modal>
    </div>
  );
};

/* ── CHATBOT ────────────────────────────────────── */

  const [lastDraft,setLastDraft] = useState(null);

  // Sync lead context from window._chatCtx
  useEffect(()=>{
    const t = setInterval(()=>{ setChatCtx(window._chatCtx||null); }, 800);
    return ()=>clearInterval(t);
  },[]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const renderMd = text => {
    const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return esc
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/`(.*?)`/g,'<code style="background:rgba(255,255,255,.1);padding:1px 4px;border-radius:3px">$1</code>')
      .replace(/\n/g,'<br/>');
  };

  // Detect if the AI response is an email or WhatsApp draft
  const parseDraft = (content) => {
    const emailMatch = content.match(/Subject\s*:\s*(.+)/i);
    if(emailMatch){
      const subject = emailMatch[1].trim();
      const afterSubj = content.slice(content.indexOf(emailMatch[0])+emailMatch[0].length).replace(/^\n+/,'').trim();
      return {type:'email', subject, body:afterSubj, email:chatCtx?.email||'', name:chatCtx?.name||''};
    }
    const waMatch = content.match(/^(Hi|Hello|Dear|Hey)\s+[\w\s]+[,!]/m);
    if(waMatch && content.length < 1200){
      return {type:'whatsapp', body:content, phone:chatCtx?.phone||'', name:chatCtx?.name||''};
    }
    return null;
  };

  const openEmail = (draft) => {
    const url = `mailto:${encodeURIComponent(draft.email)}?subject=${encodeURIComponent(draft.subject)}&body=${encodeURIComponent(draft.body)}`;
    window.open(url,'_blank');
  };
  const openWhatsAppDraft = (draft) => {
    const digits = (draft.phone||'').replace(/\D/g,'');
    const number = digits.length>=10 ? (digits.startsWith('91')&&digits.length===12?digits:'91'+digits.slice(-10)) : '';
    const url = `https://wa.me/${number}?text=${encodeURIComponent(draft.body)}`;
    window.open(url,'_blank');
  };

  const send = async () => {
    const text = input.trim();
    if(!text || loading) return;
    setInput('');

    // Handle "send email" / "send whatsapp" commands
    const lower = text.toLowerCase();
    if(lastDraft && (lower.includes('send email')||lower.includes('email this')||lower.includes('open email'))){
      openEmail(lastDraft);
      setMsgs(p=>[...p,{role:'user',content:text},{role:'assistant',content:'📧 Opening your email client with the draft pre-filled. Copy recipient details if needed!'}]);
      return;
    }
    if(lastDraft && (lower.includes('send whatsapp')||lower.includes('whatsapp this')||lower.includes('send on whatsapp')||lower.includes('whatsapp message'))){
      openWhatsAppDraft(lastDraft);
      setMsgs(p=>[...p,{role:'user',content:text},{role:'assistant',content:'📱 Opening WhatsApp Web with the message ready to send!'}]);
      return;
    }

    setMsgs(p=>[...p,{role:'user',content:text}]);
    setLoading(true);
    setLastDraft(null);

    // Prepend lead context if available
    const ctx = window._chatCtx;
    const fullMsg = ctx
      ? `[CRM Context — Lead: "${ctx.name}", Contact: ${ctx.contact||'—'}, Email: ${ctx.email||'—'}, Phone: ${ctx.phone||'—'}, City: ${ctx.city||'—'}, Status: ${ctx.status||'—'}, Plan: ${ctx.plan||'—'}, Owner: ${ctx.owner||'—'}]\n\nUser: ${text}`
      : text;

    try {
      if(!getToken()){
        setMsgs(p=>[...p,{role:'assistant',content:'Please log in to use the AI assistant.'}]);
        setLoading(false); return;
      }
      // Show typing indicator while waiting for response
      setMsgs(p=>[...p,{role:'assistant',content:'...'}]);
      const res = await fetch(API_BASE+'/api/chat', {
        method:'POST', headers: authHeaders(),
        body: JSON.stringify({message:fullMsg})
      });
      if(!res.ok){
        if(res.status===401||res.status===403){
          setMsgs(p=>{const u=[...p];u[u.length-1]={role:'assistant',content:'Session expired. Please log in again.'};return u;});
          setLoading(false); return;
        }
        throw new Error('API error '+res.status);
      }
      const data = await res.json();
      const reply = (data && data.response) ? data.response : 'No response received.';
      assistantBuf.current = reply;
      setMsgs(p=>{const u=[...p];u[u.length-1]={role:'assistant',content:reply};return u;});
      // Detect draft in completed response
      const draft = parseDraft(reply);
      if(draft) setLastDraft(draft);
    } catch(e){
      setMsgs(p=>{
        const u=[...p];
        const last=u[u.length-1];
        if(last&&last.role==='assistant'&&last.content==='...'){
          u[u.length-1]={role:'assistant',content:'Sorry, something went wrong. Please try again.'};
        } else {
          u.push({role:'assistant',content:'Sorry, something went wrong. Please try again.'});
        }
        return u;
      });
    }
    setLoading(false);
  };

  const onKey = e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } };

  return (
    <>
      {/* Floating button */}
      <button onClick={()=>setOpen(p=>!p)} style={{
        position:'fixed',bottom:24,right:24,width:52,height:52,borderRadius:'50%',
        background:'var(--blue)',border:'none',cursor:'pointer',boxShadow:'0 4px 16px rgba(61,111,255,.5)',
        display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,zIndex:900,
        transition:'transform .2s',transform:open?'rotate(45deg)':'none'
      }} title="AI Assistant">
        {open ? '✕' : '💬'}
      </button>

      {/* Slide-in panel */}
      {open && (
        <div style={{
          position:'fixed',bottom:88,right:24,width:420,height:580,
          background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:16,
          display:'flex',flexDirection:'column',zIndex:899,
          boxShadow:'0 12px 48px rgba(0,0,0,.5)',overflow:'hidden'
        }}>
          {/* Header */}
          <div style={{padding:'14px 18px',borderBottom:'1px solid var(--bdr)',display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🤖</div>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'var(--white)'}}>Barometer AI</div>
              <div style={{fontSize:11,color:'var(--teal)'}}>● Online</div>
            </div>
            <button onClick={()=>{setMsgs([{role:'assistant',content:'Chat cleared. How can I help?'}]);setLastDraft(null);}}
              style={{marginLeft:'auto',background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:11,padding:'4px 8px',borderRadius:6}}>Clear</button>
          </div>

          {/* Lead context banner */}
          {chatCtx && (
            <div style={{padding:'7px 16px',background:'rgba(61,111,255,.1)',borderBottom:'1px solid rgba(61,111,255,.2)',display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:11}}>📍</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--sky)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{chatCtx.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>Lead context active · Ask me to draft email or WhatsApp</div>
              </div>
            </div>
          )}

          {/* Messages */}
          <div style={{flex:1,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                <div style={{
                  maxWidth:'85%',padding:'9px 13px',borderRadius:m.role==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px',
                  background:m.role==='user'?'var(--blue)':'rgba(255,255,255,.06)',
                  color:'var(--white)',fontSize:13,lineHeight:1.5
                }} dangerouslySetInnerHTML={{__html:renderMd(m.content)}}/>
                {/* Draft action buttons on last assistant message */}
                {i===msgs.length-1 && m.role==='assistant' && lastDraft && !loading && (
                  <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap'}}>
                    {lastDraft.type==='email' && (
                      <button onClick={()=>openEmail(lastDraft)}
                        style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',background:'rgba(61,111,255,.15)',border:'1px solid rgba(61,111,255,.4)',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600,color:'var(--sky)',transition:'all .15s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(61,111,255,.3)'}
                        onMouseLeave={e=>e.currentTarget.style.background='rgba(61,111,255,.15)'}>
                        📧 Open in Email{lastDraft.email?` (${lastDraft.email.slice(0,20)}…)`:''}
                      </button>
                    )}
                    <button onClick={()=>openWhatsAppDraft(lastDraft)}
                      style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',background:'rgba(37,211,102,.1)',border:'1px solid #25D366',borderRadius:8,cursor:'pointer',fontSize:11,fontWeight:600,color:'#25D366',transition:'all .15s'}}
                      onMouseEnter={e=>e.currentTarget.style.background='rgba(37,211,102,.2)'}
                      onMouseLeave={e=>e.currentTarget.style.background='rgba(37,211,102,.1)'}>
                      📱 Send via WhatsApp{lastDraft.phone?` (${lastDraft.phone})`:''}
                    </button>
                  </div>
                )}
              </div>
            ))}
            {loading && (
              <div style={{display:'flex',gap:4,padding:'4px 6px'}}>
                {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--blue)',animation:`pulse ${0.4+i*0.2}s ease infinite`}}/>)}
              </div>
            )}
            <div ref={bottomRef}/>
          </div>

          {/* Input */}
          <div style={{padding:'12px 16px',borderTop:'1px solid var(--bdr)',display:'flex',gap:8}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey}
              placeholder={chatCtx?`Ask about ${chatCtx.name}, draft email/WhatsApp…`:"Ask about leads, clients, pipeline…"}
              rows={2} style={{
                flex:1,background:'rgba(255,255,255,.06)',border:'1px solid var(--bdr)',
                borderRadius:10,color:'var(--white)',fontSize:13,padding:'8px 12px',resize:'none',
                fontFamily:'inherit',outline:'none'
              }}/>
            <button onClick={send} disabled={loading||!input.trim()} style={{
              background:'var(--blue)',border:'none',borderRadius:10,color:'#fff',
              padding:'0 16px',cursor:'pointer',fontSize:18,opacity:(loading||!input.trim())?0.5:1
            }}>➤</button>
          </div>
        </div>
      )}
    </>
  );
};
