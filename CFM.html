<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0B0E1A"/>
<title>Barometer CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0E1A;--surf:#131627;--card:#181C2D;--bdr:#21253A;
  --blue:#3D6FFF;--sky:#5FA8FF;--blue-g:rgba(61,111,255,.12);
  --teal:#00C9A7;--teal-g:rgba(0,201,167,.1);
  --amber:#FFB020;--amber-g:rgba(255,176,32,.12);
  --red:#FF4F4F;--red-g:rgba(255,79,79,.12);
  --purple:#9F7AFF;--purple-g:rgba(159,122,255,.12);
  --green:#3DD68C;--green-g:rgba(61,214,140,.1);
  --white:#EEF2FF;--muted:#52597A;--body:#B0B8D8;
  --serif:'Syne',sans-serif;--sans:'DM Sans',system-ui,sans-serif;
}
html,body,#root{height:100%;font-family:var(--sans);background:var(--bg);color:var(--body);font-size:13px;line-height:1.5}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes ring{0%,100%{transform:rotate(0)}10%{transform:rotate(-15deg)}20%{transform:rotate(15deg)}30%{transform:rotate(-10deg)}40%{transform:rotate(10deg)}50%{transform:rotate(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.4)}
button{font-family:var(--sans)}

/* Hide hamburger button on desktop (>=768px) */
@media (min-width: 768px) {
  .hamburger-btn {
    display: none !important;
  }
  .sidebar-backdrop {
    display: none !important;
  }
}

/* Hide hamburger button on desktop */
@media (min-width: 768px) {
  .hamburger-btn {
    display: none !important;
  }
  .sidebar-backdrop {
    display: none !important;
  }
}

/* ═══════════════════════════════════════════════════════════════════════════════
   MOBILE RESPONSIVE — MAX 767px
   All mobile overrides in one place
   Desktop (≥768px) is completely untouched
═══════════════════════════════════════════════════════════════════════════════ */

@media (max-width: 767px) {
  /* Force single column grid */
  div[style*="gridTemplateColumns: \"190px 1fr\""],
  div[style*="display: grid"] {
    display: grid !important;
    grid-template-columns: 1fr !important;
    width: 100% !important;
  }

  body,
  html {
    width: 100% !important;
    overflow: visible !important;
  }

  #root {
    display: grid !important;
    grid-template-columns: 1fr !important;
    width: 100% !important;
  }

  /* Global rules */
  * { touch-action: manipulation; }
  input,select,textarea { font-size: 16px; }
  button,a { user-select: none; }

  /* ─────────────────────────────────────────────────────────────
     2. SIDEBAR / DRAWER
  ─────────────────────────────────────────────────────────────── */
  aside {
    position: fixed !important;
    left: 0 !important;
    top: 0 !important;
    right: auto !important;
    bottom: auto !important;
    height: 100dvh !important;
    width: 280px !important;
    z-index: 250 !important;
    transform: translateX(-100%) !important;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    box-shadow: 4px 0 24px rgba(0,0,0,0.5) !important;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch !important;
    border-right: none !important;
    border: none !important;
    padding: 22px 0 !important;
    background: var(--surf) !important;
    display: flex !important;
    flex-direction: column !important;
    margin: 0 !important;
    max-height: 100% !important;
    min-width: auto !important;
    grid-column: auto !important;
    grid-row: auto !important;
  }

  aside.sidebar-open {
    transform: translateX(0) !important;
  }

  aside > div {
    padding: 0 10px !important;
  }

  aside button {
    min-height: 48px !important;
    user-select: none;
  }

  /* Sidebar backdrop overlay */
  .sidebar-backdrop {
    position: fixed !important;
    inset: 0 !important;
    background: rgba(0,0,0,0.65) !important;
    backdrop-filter: blur(3px) !important;
    z-index: 240 !important;
    animation: fadeIn 0.2s ease !important;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ─────────────────────────────────────────────────────────────
     3. TOP BAR / HEADER & HAMBURGER
  ─────────────────────────────────────────────────────────────── */
  .hamburger-btn {
    position: fixed !important;
    top: 12px !important;
    left: 12px !important;
    z-index: 301 !important;
    width: 40px !important;
    height: 40px !important;
    min-width: 40px !important;
    min-height: 40px !important;
    padding: 0 !important;
    margin: 0 !important;
    border-radius: 8px !important;
    background: var(--card) !important;
    border: 1px solid var(--bdr) !important;
    cursor: pointer !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 20px !important;
    line-height: 1 !important;
    color: var(--body) !important;
    font-weight: 700 !important;
    transition: all 0.15s ease !important;
    font-family: var(--sans) !important;
  }

  .hamburger-btn:hover {
    background: var(--surf) !important;
  }

  .hamburger-btn:active {
    opacity: 0.7 !important;
  }

  /* ─────────────────────────────────────────────────────────────
     4. MAIN CONTENT AREA
  ─────────────────────────────────────────────────────────────── */
  main {
    position: relative !important;
    width: 100% !important;
    min-height: 100vh !important;
    padding: 16px !important;
    padding-bottom: 80px !important;
    margin: 0 !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
    display: flex !important;
    flex-direction: column !important;
    z-index: 100 !important;
    background: var(--bg) !important;
  }

  /* ─────────────────────────────────────────────────────────────
     5. STAT CARDS
  ─────────────────────────────────────────────────────────────── */
  div[style*="display: grid"] [style*="gridTemplateColumns"] {
    grid-template-columns: 1fr 1fr !important;
  }

  /* Stat cards grid responsive */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-card {
    padding: 12px !important;
    border-radius: 10px;
  }

  .stat-card-value {
    font-size: 24px !important;
  }

  .stat-card-label {
    font-size: 10px !important;
    letter-spacing: 0.05em;
  }

  .stat-card-sub {
    font-size: 9px !important;
  }

  /* ─────────────────────────────────────────────────────────────
     6. TAB BAR / TABS
  ─────────────────────────────────────────────────────────────── */
  div[style*="display: flex"][style*="gap"] [style*="whiteSpace: nowrap"],
  button[style*="whiteSpace: nowrap"] {
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    scroll-behavior: smooth;
    margin: 0 -16px;
    padding: 8px 16px;
  }

  .tab-bar::-webkit-scrollbar {
    display: none;
  }

  .tab-bar button {
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 44px;
    padding: 8px 16px;
  }

  /* ─────────────────────────────────────────────────────────────
     7. BOTTOM NAVIGATION
  ─────────────────────────────────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--surf);
    border-top: 1px solid var(--bdr);
    display: flex;
    justify-content: space-around;
    z-index: 200;
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    height: 60px;
    cursor: pointer;
    color: var(--muted);
    font-size: 9px;
    border: none;
    background: transparent;
    border-top: 2px solid transparent;
    transition: all 0.2s;
    font-family: var(--sans);
  }

  .bottom-nav-item.active {
    color: var(--blue);
    border-top-color: var(--blue);
  }

  .bottom-nav-item:active {
    opacity: 0.7;
  }

  .bottom-nav-icon {
    font-size: 18px;
    margin-bottom: 2px;
  }

  /* ─────────────────────────────────────────────────────────────
     8. SEARCH & FILTER ROW
  ─────────────────────────────────────────────────────────────── */
  .filter-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
  }

  .filter-row input,
  .filter-row select {
    width: 100%;
    min-height: 44px;
  }

  .filter-row-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .filter-row-buttons button {
    width: 100%;
    min-height: 40px;
    font-size: 12px;
    padding: 10px 12px;
  }

  /* ─────────────────────────────────────────────────────────────
     9. LEAD CARDS / LIST VIEW
  ─────────────────────────────────────────────────────────────── */
  .lead-card {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .lead-card-name {
    font-size: 14px;
    margin-bottom: 6px;
  }

  .lead-card-meta {
    font-size: 12px;
    margin-bottom: 8px;
  }

  .lead-card-status {
    font-size: 11px;
    margin-bottom: 8px;
  }

  .lead-card-buttons {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .lead-card-button {
    width: 100%;
    min-height: 36px;
    font-size: 12px;
    padding: 8px 12px;
  }

  /* Hide table view toggle, force card view on mobile */
  button[style*="Table"] {
    display: none;
  }

  /* ─────────────────────────────────────────────────────────────
     10. LEAD DETAIL SLIDE PANEL
  ─────────────────────────────────────────────────────────────── */
  .lead-detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100dvh;
    background: var(--card);
    border: none;
    border-radius: 0;
    padding: 0;
    z-index: 300;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .lead-detail-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--card);
    border-bottom: 1px solid var(--bdr);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 44px;
  }

  .lead-detail-close-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: none;
    border: 1px solid var(--bdr);
    border-radius: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .lead-detail-content {
    padding: 16px;
    padding-bottom: 80px;
  }

  /* ─────────────────────────────────────────────────────────────
     11. MODALS / FORMS
  ─────────────────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 400;
  }

  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    padding: 0;
    z-index: 400;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--bdr);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 44px;
    background: var(--card);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }

  .modal-header span:first-child {
    font-size: 16px;
    font-weight: 700;
  }

  .modal-close-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid var(--bdr);
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
  }

  .modal-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    padding-bottom: 60px;
  }

  .modal input,
  .modal select,
  .modal textarea {
    width: 100%;
    font-size: 16px;
    min-height: 44px;
  }

  .form-field {
    margin-bottom: 12px;
  }

  .form-field label {
    font-size: 12px;
    display: block;
    margin-bottom: 6px;
  }

  /* ─────────────────────────────────────────────────────────────
     12. CHATBOT PANEL
  ─────────────────────────────────────────────────────────────── */
  .chatbot-btn {
    position: fixed;
    bottom: 76px;
    right: 16px;
    width: 52px;
    height: 52px;
    border-radius: 26px;
    z-index: 180;
  }

  .chatbot-panel {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    z-index: 350;
    display: flex;
    flex-direction: column;
  }

  .chatbot-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--bdr);
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 44px;
    position: sticky;
    top: 0;
    z-index: 10;
    flex-shrink: 0;
  }

  .chatbot-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .chatbot-input-area {
    position: sticky;
    bottom: 0;
    padding: 12px 16px;
    border-top: 1px solid var(--bdr);
    display: flex;
    gap: 8px;
    background: var(--card);
    flex-shrink: 0;
  }

  .chatbot-input-area input {
    flex: 1;
    min-height: 44px;
    font-size: 16px;
  }

  .chatbot-input-area button {
    min-width: 44px;
    min-height: 44px;
  }

  /* ─────────────────────────────────────────────────────────────
     13. TYPOGRAPHY SCALING
  ─────────────────────────────────────────────────────────────── */
  h1,
  div[style*="fontFamily: var(--serif)"][style*="fontSize: 20px"],
  div[style*="fontFamily: var(--serif)"][style*="fontSize: 24px"],
  div[style*="fontFamily: var(--serif)"][style*="fontSize: 26px"],
  div[style*="fontFamily: var(--serif)"][style*="fontSize: 28px"],
  div[style*="fontFamily: var(--serif)"][style*="fontSize: 32px"] {
    font-size: 22px !important;
  }

  h2,
  div[style*="fontSize: 16px"][style*="fontWeight: 700"] {
    font-size: 16px !important;
  }

  body,
  div,
  p {
    font-size: 13px !important;
  }

  div[style*="fontSize: 11px"],
  div[style*="fontSize: 10px"] {
    font-size: 11px !important;
  }

  /* ─────────────────────────────────────────────────────────────
     14. BUTTON & TAP TARGETS
  ─────────────────────────────────────────────────────────────── */
  button {
    min-height: 44px;
    min-width: 44px;
  }

  input,
  select,
  textarea {
    min-height: 44px;
  }

  a {
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }

  /* ─────────────────────────────────────────────────────────────
     15. SCROLLING IMPROVEMENTS
  ─────────────────────────────────────────────────────────────── */
  main,
  aside,
  .modal-content,
  .chatbot-content {
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  /* Hide desktop-only elements */
  div[style*="position: sticky"][style*="width: 280px"] {
    display: none;
  }

  /* Make sure sidebar on mobile is visible when sidebarOpen */
  aside[data-mobile-open="true"] {
    transform: translateX(0);
  }
}

/* ─────────────────────────────────────────────────────────────
   HOVER STATES DISABLED ON TOUCH DEVICES
   ─────────────────────────────────────────────────────────────── */
@media (hover: none) {
  button:hover {
    opacity: 1;
  }

  a:hover {
    opacity: 1;
  }

  div[role="button"]:hover {
    opacity: 1;
  }

  button:active,
  a:active,
  div[role="button"]:active {
    opacity: 0.7;
  }
}

/* ─────────────────────────────────────────────────────────────
   EXTRA SMALL SCREENS (< 380px)
   ─────────────────────────────────────────────────────────────── */
@media (max-width: 380px) {
  .filter-row-buttons {
    grid-template-columns: 1fr;
  }

  .lead-card-buttons {
    flex-direction: column;
  }

  main {
    padding: 12px;
    padding-bottom: 70px;
  }

  .hamburger-btn {
    width: 36px;
    height: 36px;
    font-size: 18px;
  }
}

</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ── API CONFIG ────────────────────────────────── */
// Reads from config.js (window.CRM_CONFIG.apiBase) — update config.js for production.
// Falls back to localhost:8080 for local dev if config.js is absent.
const API_BASE = (window.CRM_CONFIG && window.CRM_CONFIG.apiBase !== undefined)
  ? window.CRM_CONFIG.apiBase
  : (location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:8080' : '');
const VAPID_PUBLIC_KEY = 'BDrmMHUshGceHdHdsgmiEqsI8YK3ncU29XVHqEF96cG5MBPnEVUscOXEpGyae1N1pWUq_CMRNP6FZ-gwmGsS-g0';

/* ── PWA INSTALL PROMPT — module-level capture ─── */
// Must be registered immediately (not inside a component) so the event is never missed,
// regardless of which component is mounted when Chrome fires beforeinstallprompt.
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  window.dispatchEvent(new CustomEvent('pwa-prompt-available'));
});
window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  window.dispatchEvent(new CustomEvent('pwa-installed'));
});

/* ── AUTH HELPERS ──────────────────────────────── */
const SESSION_DAYS = 30;
const getToken   = () => localStorage.getItem('crm_token');
const getUser    = () => { try { return JSON.parse(localStorage.getItem('crm_user')||'null'); } catch{ return null; } };
const isAdmin    = () => { const u=getUser(); return u && u.role==='sales_head'; };
const authHeaders= () => ({ 'Content-Type':'application/json', ...(getToken()?{'Authorization':'Bearer '+getToken()}:{}) });
const isSessionValid = () => {
  const t = localStorage.getItem('crm_login_time');
  if (!t || !getToken()) return false;
  return (Date.now() - Number(t)) < SESSION_DAYS * 24 * 60 * 60 * 1000;
};
const doLogout = () => {
  localStorage.removeItem('crm_token');
  localStorage.removeItem('crm_user');
  localStorage.removeItem('crm_login_time');
  window.location.reload();
};

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

/* ── STATUS CONFIG ─────────────────────────────── */

  {key:"on_hold",           label:"On Hold",              color:"#52597A", bg:"rgba(82,89,122,.2)"},
  {key:"future_prospect",   label:"Future Prospect",      color:"#3DD68C", bg:"rgba(61,214,140,.13)"},
  {key:"not_relevant",      label:"Not Relevant",         color:"#383D55", bg:"rgba(56,61,85,.25)"},
];

const OUTLET_TYPES = ["Restaurant","Bar","Cloud Kitchen","Chain","QSR","Cafe","Hotel","Catering"];
const CHANNELS     = ["Cold Outreach","Reference","AAHAR Exhibition","Event / Workshop","POS Partner","Instagram / Social","Walk-in","LinkedIn"];
const TEAM         = ["Sagar (You)","BDR 1","BDR 2","AE 1"];

const PLANS = [
  // MATS Plans
  {key:"mats_essential", label:"MATS Essential",  price:2500,  billing:"Yearly",        users:3, desc:"WhatsApp support · Setup & training included",          category:"MATS"},
  {key:"mats_advanced",  label:"MATS Advanced",   price:4000,  billing:"Every 6 months",users:4, desc:"Phone support · Data audits & corrections",             category:"MATS"},
  {key:"mats_ultimate",  label:"MATS Ultimate",   price:6000,  billing:"Every 3 months",users:5, desc:"Monthly consultation · Customised monthly reports",     category:"MATS"},

// Compute next renewal date from start date + billing cycle
const computeRenewal = (startDate, billingKey) => {
  if(!startDate || !billingKey) return "";
  const cycle = BILLING_CYCLES.find(b=>b.key===billingKey);
  if(!cycle) return "";
  const d = new Date(startDate+"T00:00:00");
  const now = new Date();
  // advance by cycle months until we pass today
  while(d <= now) d.setMonth(d.getMonth() + cycle.months);
  return d.toISOString().slice(0,10);
};

/* ── REMINDER SOUND ────────────────────────────── */
const playReminderSound = () => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const play = (freq, start, dur, vol=0.32) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    };
    // Ascending chime: C5 → E5 → G5
    play(523.25, 0.00, 0.25);
    play(659.25, 0.22, 0.25);
    play(783.99, 0.44, 0.55);
    // Repeat once for emphasis
    play(523.25, 1.10, 0.18);
    play(659.25, 1.28, 0.18);
    play(783.99, 1.46, 0.40);
    setTimeout(() => { try{ctx.close();}catch(e){} }, 3000);
  } catch(e) {}
};

        <Field label="GST Company Name" col="span 2"><Inp value={f.gstName} onChange={set("gstName")} placeholder="Registered company name"/></Field>
        <Field label="GST Number" col="span 2"><Inp value={f.gstNo} onChange={set("gstNo")} placeholder="e.g. 27AABCS1429B1ZB"/></Field>
      </div>

      {/* Section: Follow-up & Notes */}
      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--blue)",marginBottom:10,paddingBottom:6,borderBottom:"1px solid var(--bdr)"}}>Follow-up & Notes</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
        <Field label="Last Contacted"><Inp value={f.lastContacted} onChange={set("lastContacted")} type="date"/></Field>
        <Field label="Follow-up Date"><Inp value={f.followDate} onChange={set("followDate")} type="date"/></Field>
        <Field label="Follow-up Time"><Inp value={f.followTime} onChange={set("followTime")} type="time"/></Field>
        <div/>
        <Field label="Remarks / Key Notes" col="span 2"><Tex value={f.remarks} onChange={set("remarks")} placeholder="Key insights, objections, competitor info…" style={{minHeight:60}}/></Field>
        <Field label="Internal Notes" col="span 2"><Tex value={f.notes} onChange={set("notes")} placeholder="Additional notes for the team…" style={{minHeight:60}}/></Field>
      </div>

      <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:4}}>
        <Btn onClick={onCancel}>Cancel</Btn>
        <Btn variant="primary" onClick={()=>{ if(!f.name.trim()) return; onSave(f); }}>Save Lead</Btn>
      </div>
    </div>
  );
};

const downloadBulkTemplate = (destKey) => {
  const tmpl = BULK_TEMPLATES[destKey];
  if(!tmpl || typeof XLSX === "undefined") return;

  // Build worksheet data: hints row + sample rows
  const hintRow = tmpl.headers.map(h => tmpl.hints[h] || "");
  const data = [tmpl.headers, hintRow];

  const ws = XLSX.utils.aoa_to_sheet(data);

  // Column widths
  ws["!cols"] = tmpl.headers.map(() => ({wch: 22}));

  // Style header row (XLSX.js CE doesn't support cell styles, but we can at least freeze)
  ws["!freeze"] = {xSplit:0, ySplit:1};

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, tmpl.label.slice(0,31));

  // Add a "Field Guide" sheet
  const guideData = [
    ["Field Name", "Required?", "Accepted Values / Format"],
    ...tmpl.headers.map(h => [
      h,
      tmpl.required.includes(h) ? "✓ Required" : "Optional",
      tmpl.hints[h] || "",
    ])
  ];
  const wsGuide = XLSX.utils.aoa_to_sheet(guideData);
  wsGuide["!cols"] = [{wch:28},{wch:14},{wch:55}];
  XLSX.utils.book_append_sheet(wb, wsGuide, "Field Guide");

  XLSX.writeFile(wb, tmpl.filename);
};

const BulkModal = ({open, onClose, onImport, defaultDest=""}) => {
  const [dest,setDest]   = useState(defaultDest);
  const [step,setStep]   = useState(0);
  const [rows,setRows]   = useState([]);
  const [hdrs,setHdrs]   = useState([]);
  const [map,setMap]     = useState({});
  const [prev,setPrev]   = useState([]);
  const [fname,setFname] = useState("");
  const [drag,setDrag]   = useState(false);
  const [err,setErr]     = useState("");

  const [uploadMode,setUploadMode] = useState("file"); // "file" | "paste"
  const [pasteText,setPasteText]   = useState("");

  const reset = () => { setDest(defaultDest||""); setStep(0); setRows([]); setHdrs([]); setMap({}); setPrev([]); setFname(""); setErr(""); setPasteText(""); setUploadMode("file"); };
  const selectedDest = DESTINATIONS.find(d=>d.key===dest);

  // Auto-detect field from a single cell value
  const detectField = (val) => {
    const v = String(val||"").trim();
    if(/^[\w._%+\-]+@[\w.\-]+\.[a-zA-Z]{2,}$/.test(v))   return "Email";
    if(/^[\d\s\-\+\(\)]{7,15}$/.test(v))                  return "Phone";
    if(/^[\d]{5,10}$/.test(v))                                return "Potential Revenue (₹)";
    if(/^(mumbai|delhi|pune|bangalore|bengaluru|hyderabad|chennai|kolkata|ahmedabad|surat|jaipur|gurgaon|noida|chandigarh|indore|nagpur|bhopal|lucknow|patna|kochi)$/i.test(v)) return "City";
    return null;
  };

  // Guess field from column header text
  const guessField = (hdr, isClient) => {
    const l = String(hdr||"").toLowerCase().trim();
    if(/brand|outlet|restaurant|company|business/.test(l) || (l==="name"&&!l.includes("contact"))) return "Brand / Outlet Name";
    if(/contact|person|owner|manager|client.name/.test(l)) return "Contact Person";
    if(/phone|mobile|whatsapp|cell/.test(l))  return "Phone";
    if(/email|mail/.test(l))                  return "Email";
    if(/city|location|area/.test(l))          return "City";
    if(/type|category|cuisine/.test(l))       return "Outlet Type";
    if(!isClient && /channel|source/.test(l)) return "Source Channel";
    if(!isClient && /revenue|value|amount/.test(l)) return "Potential Revenue (₹)";
    if(/follow.?up|next.?call|follow.?date/.test(l)) return "Follow-up Date";
    if(!isClient && /note|remark/.test(l))    return "Notes";
    if(isClient && /plan|package|tier/.test(l))      return "Plan Key";
    if(isClient && /cost.centre|setup|location|outlets/.test(l)) return "No. of Cost Centres";
    if(isClient && /start|onboard|joined|since/.test(l)) return "Start Date";
    if(isClient && /billing|cycle|frequency/.test(l)) return "Billing Cycle";
    if(isClient && /check.?in|last.?visit/.test(l))  return "Last Check-in";
    if(isClient && /nps|rating|score|satisfaction/.test(l)) return "NPS (1-5)";
    if(isClient && /upsell|opportunity|upgrade/.test(l)) return "Upsell Opportunity";
    if(isClient && /health|status|sentiment/.test(l)) return "Health Status";
    if(/owner|assigned|rep|bdm/.test(l))      return isClient ? "Owner" : null;
    if(/note|remark/.test(l))                 return "Notes";
    return null;
  };

  const buildAutoMap = (headers, firstRow, isClient) => {
    const am = {};
    // First pass: header-based guessing
    headers.forEach((h,i)=>{ const g=guessField(h,isClient); if(g) am[i]=g; });
    // Second pass: for columns where header didn't match, try value-based detection
    headers.forEach((h,i)=>{
      if(am[i]) return;
      const val = firstRow?.[i];
      const detected = detectField(val);
      if(detected && !Object.values(am).includes(detected)) am[i]=detected;
    });
    // Third pass: if still no "Brand / Outlet Name", assign first unassigned text column
    if(!Object.values(am).includes("Brand / Outlet Name")){
      for(let i=0;i<headers.length;i++){
        if(!am[i]){ am[i]="Brand / Outlet Name"; break; }
      }
    }
    // Fourth pass: if no Contact Person, assign second unassigned text column
    if(!Object.values(am).includes("Contact Person")){
      for(let i=0;i<headers.length;i++){
        if(!am[i]){ am[i]="Contact Person"; break; }
      }
    }
    return am;
  };

  // Parse pasted tab-separated text (copied from Excel/Sheets)
  const parsePaste = () => {
    const text = pasteText.trim();
    if(!text){ setErr("Paste some data first"); return; }
    setErr("");
    const lines = text.split("\n").filter(l=>l.trim()!=="");
    if(lines.length<1){ setErr("No data found in paste"); return; }
    const isClient = selectedDest && selectedDest.type==="client";

    // Parse rows — handle both tab and comma separation
    const parseRow = line => {
      // Try tab first
      if(line.includes("\t")) return line.split("\t").map(c=>c.trim());
      // Fall back to comma (basic CSV — no quoted commas support)
      return line.split(",").map(c=>c.trim().replace(/^["']|["']$/g,""));
    };

    const allRows = lines.map(parseRow);
    
    // Detect if first row looks like a header (contains no emails, phones, mostly text)
    const firstRow = allRows[0];
    const hasHeader = firstRow.every(cell=>{
      const v = String(cell||"").trim();
      return !/^[\d\s\-\+]{7,15}$/.test(v) && // not a phone
             !/^[\w._%+\-]+@[\w.\-]+\.[a-zA-Z]{2,}$/.test(v) && // not an email
             !/^\d+$/.test(v); // not a pure number
    });

    let headers, dataRows;
    if(hasHeader){
      headers  = firstRow.map(h=>String(h).trim());
      dataRows = allRows.slice(1).filter(r=>r.some(c=>String(c||"").trim()!==""));
    } else {
      // No header row — generate generic column names
      headers  = firstRow.map((_,i)=>`Column ${i+1}`);
      dataRows = allRows.filter(r=>r.some(c=>String(c||"").trim()!==""));
    }

    if(dataRows.length===0){ setErr("No data rows found"); return; }

    const am = buildAutoMap(headers, dataRows[0], isClient);
    if(isClient){ /* additional client field detection already in buildAutoMap */ }
    if(selectedDest && selectedDest.type==="client"){
      headers.forEach((hh,i)=>{
        const l=hh.toLowerCase();
        if(!am[i]){
          if(/plan|package|tier/.test(l))           am[i]="Plan Key";
          else if(/start|onboard|joined|since/.test(l)) am[i]="Start Date";
          else if(/billing|cycle|frequency/.test(l)) am[i]="Billing Cycle";
          else if(/nps|rating|score|satisfaction/.test(l)) am[i]="NPS (1-5)";
          else if(/upsell|opportunity|upgrade/.test(l)) am[i]="Upsell Opportunity";
        }
      });
    }

    setHdrs(headers); setRows(dataRows); setMap(am);
    setFname(`Pasted data (${dataRows.length} rows)`);
    setStep(2);
  };

  const parse = file => {
    if(!file) return;
    if(!["xlsx","xls","csv"].includes(file.name.split(".").pop().toLowerCase())) { setErr("Upload .xlsx, .xls or .csv"); return; }
    setFname(file.name); setErr("");
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb   = XLSX.read(e.target.result,{type:"array"});
        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""});
        if(data.length<2){setErr("Need at least 1 header row + 1 data row");return;}
        const h = data[0].map(x=>String(x).trim());
        const d = data.slice(1).filter(r=>r.some(c=>String(c).trim()!==""));
        setHdrs(h); setRows(d);
        const am={};
        h.forEach((hh,i)=>{
          const l=hh.toLowerCase();
          if(/brand|outlet|restaurant|company|business|name/.test(l)&&!Object.values(am).includes("Brand / Outlet Name")) am[i]="Brand / Outlet Name";
          else if(/contact|person|owner|manager/.test(l)) am[i]="Contact Person";
          else if(/phone|mobile|whatsapp/.test(l))        am[i]="Phone";
          else if(/email|mail/.test(l))                   am[i]="Email";
          else if(/city|location/.test(l))                am[i]="City";
          else if(/type|category/.test(l))                am[i]="Outlet Type";
          else if(/channel|source/.test(l))               am[i]="Source Channel";
          else if(/revenue|value|amount/.test(l))         am[i]="Potential Revenue (₹)";
          else if(/note|remark/.test(l))                  am[i]="Notes";
        });
        // Also auto-map client-specific fields
        if(selectedDest && selectedDest.type==="client"){
          h.forEach((hh,i)=>{
            const l=hh.toLowerCase();
            if(/plan|package|tier/.test(l))           am[i]="Plan Key";
            else if(/cost.centre|centre|setup|outlet|location/.test(l)) am[i]="No. of Cost Centres";
            else if(/start|onboard|joined|since/.test(l)) am[i]="Start Date";
            else if(/billing|cycle|frequency/.test(l)) am[i]="Billing Cycle";
            else if(/checkin|check.in|last.contact|touch/.test(l)) am[i]="Last Check-in";
            else if(/nps|rating|score|satisfaction/.test(l)) am[i]="NPS (1-5)";
            else if(/upsell|opportunity|upgrade/.test(l)) am[i]="Upsell Opportunity";
          });
        }
        setMap(am); setStep(2);
      } catch(ex){setErr("Cannot read file");}
    };
    r.readAsArrayBuffer(file);
  };

  const buildPrev = () => {
    setPrev(rows.slice(0,5).map(row=>{
      const o={name:"",contact:"",phone:"",email:"",city:"",type:"Restaurant",channel:"Cold Outreach",revenue:"",notes:""};
      Object.entries(map).forEach(([i,f])=>{ const k=BULK_KEYS[f]; if(k) o[k]=String(row[i]||"").trim(); });
      return o;
    }));
    setStep(3);
  };

  const doImport = async () => {
    const isClient = selectedDest && selectedDest.type === "client";
    const fieldMap = isClient ? CLIENT_KEYS : BULK_KEYS;
    const all = rows.map(row=>{
      const o = isClient
        ? {...emptyClient()}
        : {...emptyLead(), status:"contacted"};
      Object.entries(map).forEach(([i,f])=>{ const k=fieldMap[f]; if(k) o[k]=String(row[i]||"").trim(); });
      if(!o.name) o.name=o.contact||"Unknown";
      if(!isClient){ o.revenue=parseInt(o.revenue)||0; if(selectedDest&&selectedDest.channel) o.channel=selectedDest.channel; }
      else { o.nps=parseInt(o.nps)||5; o.costCentres=o.costCentres||"1"; o.health=o.health||"happy"; o.owner=o.owner||"Sagar (You)"; }
      return o;
    }).filter(o=>o.name&&o.name!=="Unknown");

    const endpoint = isClient ? API_BASE+'/api/clients/bulk' : API_BASE+'/api/leads/bulk';
    try {
      const r = await fetch(endpoint, {method:'POST', headers:authHeaders(), body:JSON.stringify(all)});
      if(r.ok){
        const result = await r.json();
        onImport(result, selectedDest, all.length);
        reset(); onClose();
      } else {
        setErr('Import failed — server returned an error. Please try again.');
      }
    } catch(e) {
      setErr('Connection error — make sure the backend server is running.');
    }
  };

  if(!open) return null;

  const DestBadge = () => selectedDest ? (
    <div style={{background:selectedDest.bg,border:`1px solid ${selectedDest.color}`,borderRadius:8,padding:"8px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:14}}>{selectedDest.icon}</span>
      <span style={{fontSize:11,fontWeight:700,color:selectedDest.color}}>Importing into: {selectedDest.label}</span>
      {selectedDest.channel&&<span style={{fontSize:10,color:"var(--muted)"}}>· Channel auto-set to "{selectedDest.channel}"</span>}
      {step>0&&<button onClick={()=>setStep(0)} style={{marginLeft:"auto",background:"none",border:"none",fontSize:10,color:"var(--muted)",cursor:"pointer",textDecoration:"underline"}}>Change</button>}
    </div>
  ) : null;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(6,8,18,.9)",backdropFilter:"blur(8px)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:18,padding:28,width:660,maxWidth:"96vw",maxHeight:"90vh",overflowY:"auto",animation:"up .2s ease"}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:700,color:"var(--white)"}}>Bulk Import Leads</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>.xlsx · .xls · .csv</div>
          </div>
          <button onClick={()=>{reset();onClose();}} style={{background:"none",border:"1px solid var(--bdr)",borderRadius:6,width:26,height:26,cursor:"pointer",color:"var(--muted)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Step bar */}
        <div style={{display:"flex",alignItems:"center",marginBottom:22,gap:0}}>
          {["Destination","Upload","Map","Import"].map((l,i)=>(
            <React.Fragment key={i}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:step>=i?"var(--blue)":"var(--bdr)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:step>=i?"#fff":"var(--muted)",transition:"background .25s"}}>{i+1}</div>
                <span style={{fontSize:10,color:step>=i?"var(--white)":"var(--muted)",whiteSpace:"nowrap"}}>{l}</span>
              </div>
              {i<3&&<div style={{flex:1,height:1,background:"var(--bdr)",margin:"0 8px"}}/>}
            </React.Fragment>
          ))}
        </div>

        {err&&<div style={{background:"var(--red-g)",border:"1px solid var(--red)",borderRadius:8,padding:"9px 13px",color:"var(--red)",fontSize:12,marginBottom:14}}>⚠ {err}</div>}

        {/* STEP 0 — DESTINATION */}
        {step===0&&(
          <div>
            <div style={{fontSize:13,color:"var(--body)",marginBottom:16}}>Where should these leads be added? Choose before uploading so everything lands in the right place.</div>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {DESTINATIONS.map(d=>(
                <button key={d.key} onClick={()=>setDest(d.key)}
                  style={{display:"flex",alignItems:"center",gap:16,padding:"16px 20px",borderRadius:12,
                    border:`2px solid ${dest===d.key?d.color:"var(--bdr)"}`,
                    background:dest===d.key?d.bg:"var(--surf)",
                    cursor:"pointer",textAlign:"left",transition:"all .18s",width:"100%"}}>
                  <span style={{fontSize:28,flexShrink:0}}>{d.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:dest===d.key?d.color:"var(--white)",marginBottom:3}}>{d.label}</div>
                    <div style={{fontSize:11,color:"var(--muted)"}}>{d.desc}</div>
                    {d.channel&&<div style={{fontSize:10,color:d.color,fontWeight:600,marginTop:4}}>Channel will be auto-set to "{d.channel}"</div>}
                  </div>
                  <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${dest===d.key?d.color:"var(--bdr)"}`,
                    background:dest===d.key?d.color:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {dest===d.key&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
                  </div>
                </button>
              ))}
            </div>
            {dest&&<DestBadge/>}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <Btn variant="primary" onClick={()=>{ if(!dest){setErr("Please choose a destination first");return;} setErr(""); setStep(1); }}>Continue →</Btn>
            </div>
          </div>
        )}

        {/* STEP 1 — UPLOAD / PASTE */}
        {step===1&&(
          <div>
            <DestBadge/>

            {/* Mode toggle */}
            <div style={{display:"flex",gap:0,background:"var(--surf)",borderRadius:9,padding:3,border:"1px solid var(--bdr)",marginBottom:16,width:"fit-content"}}>
              {[{k:"file",icon:"📂",l:"Upload File"},{k:"paste",icon:"📋",l:"Paste from Excel"}].map(m=>(
                <button key={m.k} onClick={()=>{setUploadMode(m.k);setErr("");}}
                  style={{padding:"7px 18px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                    fontFamily:"var(--sans)",display:"flex",alignItems:"center",gap:6,transition:"all .18s",
                    background:uploadMode===m.k?"var(--blue-g)":"transparent",
                    color:uploadMode===m.k?"var(--sky)":"var(--muted)"}}>
                  <span>{m.icon}</span>{m.l}
                </button>
              ))}
            </div>

            {/* FILE UPLOAD */}
            {uploadMode==="file"&&(
              <div>
                <div
                  onDragOver={e=>{e.preventDefault();setDrag(true);}}
                  onDragLeave={()=>setDrag(false)}
                  onDrop={e=>{e.preventDefault();setDrag(false);parse(e.dataTransfer.files[0]);}}
                  onClick={()=>document.getElementById("blkFile").click()}
                  style={{border:`2px dashed ${drag?"var(--blue)":"var(--bdr)"}`,borderRadius:12,padding:"36px 24px",textAlign:"center",cursor:"pointer",background:drag?"var(--blue-g)":"var(--surf)",transition:"all .2s",marginBottom:12}}>
                  <div style={{fontSize:34,marginBottom:8}}>📊</div>
                  <div style={{fontFamily:"var(--serif)",fontSize:15,fontWeight:600,color:"var(--white)",marginBottom:5}}>Drop your file here</div>
                  <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>.xlsx · .xls · .csv</div>
                  <Btn variant="primary">Browse File</Btn>
                  <input id="blkFile" type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>parse(e.target.files[0])}/>
                </div>

                {/* Template download card */}
                {selectedDest && BULK_TEMPLATES[selectedDest.key] && (()=>{
                  const tmpl = BULK_TEMPLATES[selectedDest.key];
                  return (
                    <div style={{background:"var(--surf)",border:"1px solid var(--bdr)",borderRadius:10,padding:"14px 16px",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontSize:12,fontWeight:700,color:"var(--white)",marginBottom:2}}>📋 {tmpl.label} — Upload Format</div>
                          <div style={{fontSize:10,color:"var(--muted)"}}>Download the template, fill it in, then upload. All {tmpl.headers.length} columns are pre-formatted.</div>
                        </div>
                        <button onClick={e=>{e.stopPropagation();downloadBulkTemplate(selectedDest.key);}}
                          style={{flexShrink:0,marginLeft:14,padding:"8px 14px",borderRadius:8,border:"1px solid var(--blue)",
                            background:"var(--blue-g)",color:"var(--sky)",fontSize:11,fontWeight:700,cursor:"pointer",
                            fontFamily:"var(--sans)",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                          ⬇ Download Template
                        </button>
                      </div>

                      {/* Required fields */}
                      <div style={{marginBottom:8}}>
                        <div style={{fontSize:10,fontWeight:600,color:"var(--red)",marginBottom:4}}>✱ Required fields</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {tmpl.required.map(h=>(
                            <span key={h} style={{background:"rgba(255,79,79,.12)",border:"1px solid rgba(255,79,79,.3)",
                              borderRadius:4,padding:"2px 8px",fontSize:10,color:"var(--red)",fontWeight:600}}>{h}</span>
                          ))}
                        </div>
                      </div>

                      {/* All columns */}
                      <div>
                        <div style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginBottom:4}}>All {tmpl.headers.length} columns</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {tmpl.headers.map(h=>(
                            <span key={h} title={tmpl.hints[h]||""}
                              style={{background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:4,
                                padding:"2px 7px",fontSize:10,
                                color: tmpl.required.includes(h) ? "var(--sky)" : "var(--body)",
                                fontWeight: tmpl.required.includes(h) ? 600 : 400,
                                cursor:"help"}}>
                              {h}
                            </span>
                          ))}
                        </div>
                        <div style={{fontSize:9,color:"var(--muted)",marginTop:5}}>Hover a column name to see accepted values · Blue = required · Grey = optional</div>
                      </div>

                      {/* Field guide inline */}
                      <details style={{marginTop:10}}>
                        <summary style={{fontSize:10,color:"var(--sky)",cursor:"pointer",userSelect:"none",fontWeight:600}}>
                          📖 View field guide & accepted values
                        </summary>
                        <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto"}}>
                          {tmpl.headers.map(h=>(
                            <div key={h} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:10}}>
                              <span style={{
                                minWidth:140,fontWeight:600,
                                color:tmpl.required.includes(h)?"var(--sky)":"var(--body)",
                                flexShrink:0}}>
                                {tmpl.required.includes(h)&&<span style={{color:"var(--red)"}}>✱ </span>}{h}
                              </span>
                              <span style={{color:"var(--muted)",lineHeight:1.5}}>{tmpl.hints[h]||"—"}</span>
                            </div>
                          ))}
                        </div>
                      </details>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* PASTE FROM EXCEL */}
            {uploadMode==="paste"&&(
              <div>
                {/* Show expected columns for paste mode too */}
                {selectedDest && BULK_TEMPLATES[selectedDest.key] && (()=>{
                  const tmpl = BULK_TEMPLATES[selectedDest.key];
                  const headerRow = tmpl.headers.join("\t");
                  const sampleRow = tmpl.sample[0].join("\t");
                  return (
                    <div style={{background:"var(--surf)",border:"1px solid var(--bdr)",borderRadius:9,padding:"10px 14px",marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                        <div style={{fontSize:11,fontWeight:700,color:"var(--white)"}}>📋 Expected columns for {tmpl.label}</div>
                        <button onClick={()=>{
                          const tsv = [tmpl.headers.join("\t"), ...tmpl.sample.map(r=>r.join("\t"))].join("\n");
                          navigator.clipboard?.writeText(tsv).then(()=>alert("Sample data copied! Paste into your Excel/Sheets then edit, copy again, and paste below."));
                        }}
                          style={{background:"var(--blue-g)",border:"1px solid rgba(61,111,255,.3)",borderRadius:6,
                            padding:"4px 10px",fontSize:10,color:"var(--sky)",cursor:"pointer",fontFamily:"var(--sans)",fontWeight:600}}>
                          📄 Copy sample data
                        </button>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                        {tmpl.headers.map(h=>(
                          <span key={h} style={{
                            background:"var(--card)",border:`1px solid ${tmpl.required.includes(h)?"rgba(61,111,255,.4)":"var(--bdr)"}`,
                            borderRadius:4,padding:"2px 7px",fontSize:10,
                            color:tmpl.required.includes(h)?"var(--sky)":"var(--muted)"}}>
                            {tmpl.required.includes(h)&&<span style={{color:"var(--red)"}}>✱</span>} {h}
                          </span>
                        ))}
                      </div>
                      <div style={{fontSize:9,color:"var(--muted)"}}>Blue ✱ = required · Copy sample data to get a head start</div>
                    </div>
                  );
                })()}
                <div style={{background:"var(--blue-g)",border:"1px solid rgba(61,111,255,.25)",borderRadius:9,padding:"10px 14px",marginBottom:12,fontSize:12,color:"var(--sky)",lineHeight:1.6}}>
                  <strong>How to paste:</strong> Open your Excel / Google Sheets → select all rows (including the header row) → Ctrl+C → click the box below → Ctrl+V
                </div>
                <textarea
                  value={pasteText}
                  onChange={e=>setPasteText(e.target.value)}
                  onPaste={e=>{
                    setTimeout(()=>{
                      const text = e.target.value || (e.clipboardData&&e.clipboardData.getData("text"));
                      if(text && text.trim()) setPasteText(text);
                    },50);
                  }}
                  placeholder={selectedDest&&BULK_TEMPLATES[selectedDest.key]
                    ? `Paste your Excel / Sheets data here…\n\nExpected header row:\n${BULK_TEMPLATES[selectedDest.key].headers.join("\t")}\n\nSample data row:\n${BULK_TEMPLATES[selectedDest.key].sample[0].join("\t")}`
                    : "Paste your Excel data here…"}
                  style={{width:"100%",height:220,background:"var(--surf)",border:"2px solid var(--bdr)",borderRadius:10,padding:"12px 14px",color:"var(--white)",fontFamily:"monospace",fontSize:11,resize:"vertical",outline:"none",lineHeight:1.6,boxSizing:"border-box"}}
                  onFocus={e=>e.target.style.borderColor="var(--blue)"}
                  onBlur={e=>e.target.style.borderColor="var(--bdr)"}
                />
                {pasteText&&(
                  <div style={{marginTop:8,fontSize:11,color:"var(--muted)"}}>
                    ✓ {pasteText.trim().split("\n").filter(l=>l.trim()).length} rows detected · CRM will auto-detect columns
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}>
                  <Btn variant="primary" onClick={parsePaste} style={{opacity:pasteText.trim()?1:.4}}>
                    Detect Columns →
                  </Btn>
                </div>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-start",marginTop:12}}>
              <Btn onClick={()=>setStep(0)}>← Back</Btn>
            </div>
          </div>
        )}

        {/* STEP 2 — MAP */}
        {step===2&&(
          <div>
            <DestBadge/>
            <div style={{background:"var(--blue-g)",border:"1px solid rgba(61,111,255,.25)",borderRadius:8,padding:"9px 13px",fontSize:12,color:"var(--sky)",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
              <span>{fname.startsWith("Pasted")?"📋":"📂"}</span>
              <span>✓ <strong>{rows.length} rows</strong> from <strong>{fname}</strong> — columns auto-detected, adjust below if needed</span>
            </div>
            {selectedDest&&selectedDest.type==="client"&&(
              <div style={{background:"var(--teal-g)",border:"1px solid rgba(0,201,167,.2)",borderRadius:8,padding:"8px 13px",fontSize:11,color:"var(--teal)",marginBottom:10,lineHeight:1.7}}>
                ℹ <strong>Plan Key values:</strong> mats_essential · mats_advanced · mats_ultimate · bar_lite · bar_plus · bar_managed<br/>
                <span style={{color:"var(--muted)"}}>
                  <strong style={{color:"var(--teal)"}}>Health Status:</strong> happy · neutral · at_risk &nbsp;·&nbsp;
                  <strong style={{color:"var(--teal)"}}>Billing Cycle:</strong> Monthly · Quarterly · Annual &nbsp;·&nbsp;
                  <strong style={{color:"var(--teal)"}}>NPS:</strong> 1–5
                </span>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {hdrs.map((h,i)=>{
                const fields = selectedDest&&selectedDest.type==="client" ? CLIENT_FIELDS : BULK_FIELDS;
                return (
                <div key={i} style={{background:"var(--surf)",border:"1px solid var(--bdr)",borderRadius:8,padding:"10px 12px",display:"flex",flexDirection:"column",gap:5}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--white)"}}>{h}</div>
                  <div style={{fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>e.g. {String(rows[0]?.[i]||"—").slice(0,25)}</div>
                  <select value={map[i]||"— skip —"} onChange={e=>setMap(m=>({...m,[i]:e.target.value==="— skip —"?undefined:e.target.value}))}
                    style={{...IS,fontSize:11,padding:"5px 9px",color:map[i]?"var(--sky)":"var(--muted)"}}>
                    {fields.map(o=><option key={o} style={{color:"#fff"}}>{o}</option>)}
                  </select>
                </div>
              );})}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn onClick={()=>setStep(1)}>← Back</Btn>
              <Btn variant="primary" onClick={buildPrev}>Preview →</Btn>
            </div>
          </div>
        )}

        {/* STEP 3 — PREVIEW */}
        {step===3&&(
          <div>
            <div style={{background:selectedDest?.bg,border:`1px solid ${selectedDest?.color}`,borderRadius:8,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{selectedDest?.icon}</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:selectedDest?.color}}>{rows.length} leads → {selectedDest?.label}</div>
                {selectedDest?.channel&&<div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>Channel will be set to "{selectedDest.channel}" for all rows</div>}
              </div>
            </div>
            <div style={{background:"var(--teal-g)",border:"1px solid rgba(0,201,167,.25)",borderRadius:8,padding:"9px 13px",fontSize:12,color:"var(--teal)",marginBottom:12}}>
              ✓ Confirm the preview below then hit Import
            </div>
            <div style={{overflowX:"auto",marginBottom:12}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr>{["Outlet","Contact","Phone","Revenue","Notes"].map(h=>(
                  <th key={h} style={{padding:"7px 10px",textAlign:"left",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".08em",color:"var(--muted)",borderBottom:"1px solid var(--bdr)",whiteSpace:"nowrap"}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {prev.map((r,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid var(--bdr)"}}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(61,111,255,.04)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{padding:"8px 10px",color:"var(--white)",fontWeight:500}}>{r.name||"—"}</td>
                      <td style={{padding:"8px 10px"}}>{r.contact||"—"}</td>
                      <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.phone||"—"}</td>
                      <td style={{padding:"8px 10px",color:"var(--teal)"}}>{r.revenue?"₹"+parseInt(r.revenue).toLocaleString("en-IN"):"—"}</td>
                      <td style={{padding:"8px 10px",color:"var(--muted)",fontStyle:"italic",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.notes||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {rows.length>5&&<div style={{fontSize:11,color:"var(--muted)",textAlign:"center",marginBottom:10}}>+ {rows.length-5} more rows</div>}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Btn onClick={()=>setStep(2)}>← Re-map</Btn>
              <Btn variant="teal" onClick={doImport}>✓ Import {rows.length} leads into {selectedDest?.label}</Btn>
            </div>
          </div>
        )}

      </div>
    </div>
  );
};

/* ── LEAD DETAIL PANEL ─────────────────────────── */
const LeadDetailPanel = ({lead, onClose, onEdit, onLogContact}) => {
  if(!lead) return null;
  const s   = statusObj(lead.status);
  const lc  = fmtLastContacted(lead.lastContacted);
  const fu  = lead.followDate;
  const fuColor = isPast(fu)?"var(--red)":isToday(fu)?"var(--amber)":isSoon(fu)?"var(--amber)":"var(--body)";
  const [panelTab,setPanelTab] = useState('details');
  const [leadReminders,setLeadReminders] = useState(()=>{
    try{const a=JSON.parse(localStorage.getItem('crm_lead_reminders')||'{}');return a[lead.id]||[];}catch(e){return [];}
  });
  const [remForm,setRemForm] = useState({title:'',date:'',time:'',notifyBefore:0});

  useEffect(()=>{
    window._chatCtx={id:lead.id,name:lead.name,email:lead.email,phone:lead.phone,contact:lead.contact,city:lead.city,type:lead.type,status:lead.status,plan:lead.plan,owner:lead.owner};
    return ()=>{window._chatCtx=null;};
  },[lead.id]);

  const saveReminders=(list)=>{
    try{const a=JSON.parse(localStorage.getItem('crm_lead_reminders')||'{}');a[lead.id]=list;localStorage.setItem('crm_lead_reminders',JSON.stringify(a));}catch(e){}
    setLeadReminders(list);
  };
  const addReminder=()=>{
    if(!remForm.title||!remForm.date||!remForm.time) return;
    const r={id:Date.now().toString(),leadId:lead.id,leadName:lead.name,title:remForm.title,datetime:remForm.date+'T'+remForm.time,notifyBefore:parseInt(remForm.notifyBefore)||0,fired:false,createdAt:new Date().toISOString()};
    saveReminders([...leadReminders,r]);
    setRemForm({title:'',date:'',time:'',notifyBefore:0});
  };
  const deleteReminder=(id)=>saveReminders(leadReminders.filter(r=>r.id!==id));

  const Row = ({label,value,accent}) => (
    <div style={{display:"flex",flexDirection:"column",gap:3,padding:"10px 0",borderBottom:"1px solid var(--bdr)"}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)"}}>{label}</div>
      <div style={{fontSize:13,color:accent||"var(--white)",fontWeight:accent?"600":"400",wordBreak:"break-word"}}>{value||<span style={{color:"var(--muted)",fontStyle:"italic"}}>Not set</span>}</div>
    </div>
  );

  const Section = ({title,children}) => (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--blue)",marginBottom:2,paddingBottom:8,borderBottom:`1px solid ${lead.status==="negotiation"?"rgba(0,201,167,.2)":"var(--bdr)"}`,display:"flex",alignItems:"center",gap:7}}>
        {title}
      </div>
      {children}
    </div>
  );

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(6,8,18,.55)",backdropFilter:"blur(4px)",zIndex:450}}/>

      {/* Slide-in panel */}
      <div style={{position:"fixed",top:0,right:0,bottom:0,width:420,maxWidth:"95vw",background:"var(--card)",borderLeft:"1px solid var(--bdr)",zIndex:460,overflowY:"auto",animation:"slideIn .25s ease",display:"flex",flexDirection:"column"}}>

        {/* Panel header */}

              <div style={{textAlign:"center",padding:"30px 0",color:"var(--muted)",fontSize:13}}>

                {leadReminders.map(r=>{

                  const isPastR=fireAt<new Date();

                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600,color:r.fired?"var(--muted)":isPastR?"var(--red)":"var(--white)",marginBottom:3,textDecoration:r.fired?"line-through":"none"}}>{r.title}</div>
                        <div style={{fontSize:11,color:"var(--muted)"}}>
                          📅 {dt.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})} at {r.datetime.split("T")[1]||""}
                          {r.notifyBefore>0 && <span style={{marginLeft:8,color:"var(--purple)"}}>🔔 {r.notifyBefore<60?r.notifyBefore+" min":r.notifyBefore===60?"1 hr":r.notifyBefore===120?"2 hr":"1 day"} before</span>}

                        {!r.fired && isPastR && <div style={{fontSize:10,color:"var(--red)",marginTop:3}}>⚠ Overdue</div>}
                      </div>
                      <button onClick={()=>deleteReminder(r.id)} title="Delete reminder"
                        style={{background:"none",border:"1px solid var(--bdr)",borderRadius:6,width:24,height:24,cursor:"pointer",color:"var(--muted)",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor="var(--red)"}
                        onMouseLeave={e=>e.currentTarget.style.borderColor="var(--bdr)"}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* Sticky footer actions */}
        <div style={{padding:"14px 24px",borderTop:"1px solid var(--bdr)",display:"flex",gap:10,background:"var(--card)",position:"sticky",bottom:0}}>
          <Btn variant="primary" onClick={()=>onEdit(lead)} style={{flex:1}}>✏ Edit Lead</Btn>
          <Btn onClick={onClose} style={{flex:1}}>Close</Btn>

      </div>

      <style>{`@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}`}</style>

};

/* ── WHATSAPP HELPER ───────────────────────────── */
const openWhatsApp = (phone, name) => {
  if(!phone) return;
  // Strip non-digits, add 91 if not already international
  const digits = phone.replace(/\D/g,"");
  const number = digits.startsWith("91") && digits.length===12 ? digits : "91"+digits.slice(-10);
  const msg = encodeURIComponent(`Hi ${name}, this is Sagar from Barometer Tech! 👋`);
  window.open(`https://wa.me/${number}?text=${msg}`, "_blank");
};

const WABtn = ({phone, name}) => (

    onClick={e=>{ e.stopPropagation(); openWhatsApp(phone, name); }}

    onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--bdr)";e.currentTarget.style.background="var(--surf)"; }}>

/* ── LEADS VIEW ────────────────────────────────── */
const LeadsView = ({leads,setLeads,dismissed,setDismissed,notifSelectedLead,clearNotifSelected}) => {
  const [subTab,setSubTab]   = useState("all");   // "all" | "aahar"
  const [search,setSearch]   = useState("");
  const [fStatus,setFStatus] = useState("");
  const [fOwner,setFOwner]   = useState("");
  const [addOpen,setAddOpen] = useState(false);
  const [bulkOpen,setBulkOpen]= useState(false);
  const [editLead,setEditLead]= useState(null);
  const [detailLead,setDetailLead]=useState(null);
  const [toast,setToast]     = useState("");

  // Open detail panel when notification is clicked
  useEffect(()=>{
    if(notifSelectedLead){
      const fresh = leads.find(l=>l.id===notifSelectedLead.id) || notifSelectedLead;
      setDetailLead(fresh);
      clearNotifSelected();
    }
  },[notifSelectedLead]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),3500); };

  const aaharLeads = leads.filter(l=>l.channel==="AAHAR Exhibition");

  const filtered = leads.filter(l=>{
    const matchTab    = subTab==="aahar" ? l.channel==="AAHAR Exhibition" : true;
    const matchStatus = !fStatus || l.status===fStatus;
    const matchOwner  = !fOwner  || l.owner===fOwner;
    const matchSearch = !search  || l.name.toLowerCase().includes(search.toLowerCase()) || l.contact.toLowerCase().includes(search.toLowerCase()) || l.city.toLowerCase().includes(search.toLowerCase());
    return matchTab && matchStatus && matchOwner && matchSearch;
  });

  const saveLead = async f => {
    const url  = editLead ? API_BASE+'/api/leads/'+editLead.id : API_BASE+'/api/leads';
    const meth = editLead ? 'PUT' : 'POST';
    try {
      const r = await fetch(url, {method:meth, headers:authHeaders(), body:JSON.stringify({...f,revenue:parseInt(f.revenue)||0})});
      if(r.ok){
        const saved = await r.json();
        if(editLead){ setLeads(prev=>prev.map(l=>l.id===editLead.id?saved:l)); showToast("✓ Lead updated"); }
        else         { setLeads(prev=>[saved,...prev]); showToast("✓ Lead added"); }
      } else { showToast("Failed to save lead — check connection"); }
    } catch(e) { showToast("Connection error — is the server running?"); }
    setAddOpen(false); setEditLead(null);
  };

  const deleteLead = async id => {
    try {
      await fetch(API_BASE+'/api/leads/'+id, {method:'DELETE', headers:authHeaders()});
      setLeads(prev=>prev.filter(l=>l.id!==id));
      showToast("Lead removed");
    } catch(e) { showToast("Failed to delete lead"); }
  };

  const bulkImport = async (result, dest, count) => {
    if(dest && dest.type==="client"){
      window.dispatchEvent(new CustomEvent('clients-imported', {detail:{count: result?.imported ?? count}}));
      showToast(`✓ ${result?.imported ?? count} clients imported into ${dest?.label||"Onboarded Clients"}`);
    } else {
      try {
        const r = await fetch(API_BASE+'/api/leads?size=200', {headers:authHeaders()});
        if(r.ok){ const d=await r.json(); if(d?.content) setLeads(d.content); }
      } catch(e) {}
      if(dest && dest.key==="aahar") setSubTab("aahar");
      showToast(`✓ ${result?.imported ?? count} leads imported into ${dest?.label||"pipeline"}`);
    }
  };

  const totalRev      = leads.filter(l=>!["not_relevant","on_hold"].includes(l.status)).reduce((s,l)=>s+(parseInt(l.revenue)||0),0);
  const todayFollowUps= leads.filter(l=>isToday(l.followDate) && !dismissed.includes(l.id)).length;
  const overdueCount  = leads.filter(l=>isPast(l.followDate) && !dismissed.includes(l.id)).length;

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"var(--teal)",color:"#042a22",padding:"10px 20px",borderRadius:10,fontWeight:600,fontSize:13,zIndex:600,animation:"up .2s ease",boxShadow:"0 6px 24px rgba(0,0,0,.35)",whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"var(--serif)",fontSize:21,fontWeight:700,color:"var(--white)"}}>Potential <span style={{color:"var(--blue)"}}>Clients</span></div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}><span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"var(--teal)",marginRight:5,animation:"pulse 2s infinite"}}/>Live · {new Date().toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search leads…" style={{width:180}}/>
          <Sel value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{width:"auto",padding:"7px 10px"}}>
            <option value="">All Status</option>
            {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
          </Sel>
          <Sel value={fOwner} onChange={e=>setFOwner(e.target.value)} style={{width:"auto",padding:"7px 10px"}}>
            <option value="">All Owners</option>
            {TEAM.map(t=><option key={t}>{t}</option>)}
          </Sel>
          <button onClick={()=>setBulkOpen(true)}
            style={{padding:"7px 14px",background:"var(--surf)",color:"var(--teal)",border:"1.5px solid var(--teal)",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"background .15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--teal-g)"}
            onMouseLeave={e=>e.currentTarget.style.background="var(--surf)"}>

          </button>
          <Btn variant="primary" onClick={()=>{ setEditLead(null); if(subTab==="aahar") { setEditLead({...emptyLead(),channel:"AAHAR Exhibition"}); } setAddOpen(true); }}>+ Add Lead</Btn>

      {/* SUB-TABS */}
      <div style={{display:"flex",gap:0,background:"var(--surf)",borderRadius:10,padding:4,width:"fit-content",border:"1px solid var(--bdr)"}}>

          {key:"aahar", label:"🎪 AAHAR Exhibition", count:aaharLeads.length, accent:true},

          <button key={t.key} onClick={()=>setSubTab(t.key)}
