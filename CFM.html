/* ─────────────────────────────────────────────────────────────
   LOGIN PAGE
───────────────────────────────────────────────────────────── */
function LoginPage({onLogin}) {
  const [email,setEmail]       = useState('admin@barometer.com');
  const [password,setPassword] = useState('');
  const [loading,setLoading]   = useState(false);
  const [error,setError]       = useState('');
  const [serverReady,setServerReady] = useState(false);
  const [installPrompt,setInstallPrompt] = useState(()=>_pwaPrompt);
  const [installed,setInstalled]         = useState(
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true
  );

  // Wake-up ping: hit /health so Render free-tier is warm before user clicks Sign In
  useEffect(()=>{
    fetch(API_BASE+'/health').then(()=>setServerReady(true)).catch(()=>setServerReady(true));
  },[]);

  useEffect(()=>{
    const onPrompt  = () => setInstallPrompt(_pwaPrompt);
    const onInstall = () => { setInstalled(true); setInstallPrompt(null); };
    window.addEventListener('pwa-prompt-available', onPrompt);
    window.addEventListener('pwa-installed', onInstall);
    return ()=>{
      window.removeEventListener('pwa-prompt-available', onPrompt);
      window.removeEventListener('pwa-installed', onInstall);
    };
  },[]);

  const handleInstall = async () => {
    if(!installPrompt) return;
    installPrompt.prompt();
    const {outcome} = await installPrompt.userChoice;
    if(outcome==='accepted') setInstalled(true);
  };

  const handleLogin = async e => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const res  = await fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      if(!res.ok){ const data=await res.json(); throw new Error(data.error||'Invalid credentials'); }
      const data = await res.json();
      localStorage.setItem('crm_token',      data.accessToken);
      localStorage.setItem('crm_user',       JSON.stringify({id:data.id,email:data.email,name:data.name,role:data.role,initials:data.avatarInitials}));
      localStorage.setItem('crm_login_time', String(Date.now()));
      onLogin(data);
    } catch(e){ setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      {/* PWA install banner — hidden when already installed */}
      {!installed && installPrompt && (
        <div style={{position:'fixed',top:0,left:0,right:0,background:'linear-gradient(90deg,#1B2245,#3D6FFF)',padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:999,boxShadow:'0 2px 12px rgba(61,111,255,.3)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <BarometerLogo size={28}/>
            <span style={{color:'#fff',fontSize:13,fontWeight:500}}>Install Barometer CRM for the best experience</span>
          </div>
          <button onClick={handleInstall} style={{background:'#fff',color:'#1B2245',border:'none',borderRadius:8,padding:'6px 16px',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'var(--sans)'}}>
            Install App
          </button>
        </div>
      )}

      {/* Card */}
      <div style={{width:'100%',maxWidth:400,background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:20,padding:'40px 36px',boxShadow:'0 24px 60px rgba(0,0,0,.4)'}}>
        {/* Logo + brand */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14,marginBottom:32}}>
          <BarometerLogo size={72}/>
          <div style={{textAlign:'center'}}>
            <div style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:800,color:'var(--white)',letterSpacing:'.02em'}}>Barometer<span style={{color:'var(--blue)'}}>.</span></div>
            <div style={{fontSize:11,color:'var(--muted)',letterSpacing:'.12em',textTransform:'uppercase',marginTop:2}}>Sales CRM</div>
          </div>
        </div>

        <form onSubmit={handleLogin} style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Email</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" required autoFocus
              style={{width:'100%',background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:10,padding:'10px 14px',color:'var(--white)',fontSize:14,outline:'none',fontFamily:'var(--sans)'}}/>
          </div>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Password</label>
            <input value={password} onChange={e=>setPassword(e.target.value)} type="password" required
              style={{width:'100%',background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:10,padding:'10px 14px',color:'var(--white)',fontSize:14,outline:'none',fontFamily:'var(--sans)'}}/>
          </div>
          {error && <div style={{background:'var(--red-g)',border:'1px solid var(--red)',borderRadius:8,padding:'8px 12px',color:'var(--red)',fontSize:12}}>{error}</div>}
          {!serverReady && !loading && (
            <div style={{textAlign:'center',fontSize:11,color:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:'#f59e0b',display:'inline-block',animation:'pulse 1.2s ease-in-out infinite'}}></span>
              Waking up server… (~30s on free plan)
            </div>
          )}
          <button type="submit" disabled={loading||!serverReady}
            style={{marginTop:4,background:'var(--blue)',color:'#fff',border:'none',borderRadius:10,padding:'12px',fontWeight:700,fontSize:14,cursor:(loading||!serverReady)?'wait':'pointer',fontFamily:'var(--sans)',transition:'opacity .2s',opacity:(loading||!serverReady)?.5:1}}>
            {loading ? 'Signing in…' : !serverReady ? 'Waiting for server…' : 'Sign In'}
          </button>
        </form>

        {/* Install button (below form, if not in banner and not installed) */}
        {!installed && !installPrompt && (
          <div style={{marginTop:20,textAlign:'center',color:'var(--muted)',fontSize:11}}>
            Open in Chrome/Edge on mobile to install as an app
          </div>
        )}
        {!installed && installPrompt && (
          <button onClick={handleInstall} style={{marginTop:16,width:'100%',background:'transparent',border:'1px solid var(--bdr)',borderRadius:10,padding:'10px',color:'var(--muted)',fontSize:12,cursor:'pointer',fontFamily:'var(--sans)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            <span>📲</span> Add to Home Screen
          </button>
        )}
      </div>
    </div>
  );
}

function SettingsView({currentUser}) {
  const [tab, setTab] = useState('profile');
  // Create user
  const [cu_email,setCuEmail]       = useState('');
  const [cu_name,setCuName]         = useState('');
  const [cu_role,setCuRole]         = useState('bdr');
  const [cu_pass,setCuPass]         = useState('');
  const [cu_loading,setCuLoading]   = useState(false);
  const [cu_msg,setCuMsg]           = useState(null);
  // Users list
  const [users,setUsers]            = useState([]);
  const [usersLoading,setUsersLoading] = useState(false);
  // PWA install
  const [installPrompt,setInstallPrompt] = useState(()=>_pwaPrompt);
  const [installed,setInstalled]         = useState(
    window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true
  );
  // Notifications
  const [notifPerm, setNotifPerm] = useState(typeof Notification!=='undefined'?Notification.permission:'unsupported');
  const [notifRules, setNotifRules] = useState([]);
  const [notifRulesLoading, setNotifRulesLoading] = useState(false);
  const [notifPrefs, setNotifPrefs] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('crm_notif_prefs')||'{}'); } catch(e){ return {}; }
  });
  const saveNotifPrefs = prefs => { setNotifPrefs(prefs); localStorage.setItem('crm_notif_prefs', JSON.stringify(prefs)); };
  const togglePref = key => saveNotifPrefs({...notifPrefs,[key]:!notifPrefs[key]});

  const requestNotifPermission = async () => {
    if(typeof Notification==='undefined') return;
    const result = await Notification.requestPermission();
    setNotifPerm(result);
    if(result==='granted') new Notification('🎉 Notifications enabled!',{body:'You will now receive CRM reminders',tag:'notif-test'});
  };

  useEffect(()=>{
    if(tab!=='notifications') return;
    setNotifRulesLoading(true);
    fetch(API_BASE+'/api/notification-rules',{headers:authHeaders()})
      .then(r=>r.ok?r.json():[])
      .then(d=>setNotifRules(Array.isArray(d)?d:[]))
      .catch(()=>setNotifRules([]))
      .finally(()=>setNotifRulesLoading(false));
  },[tab]);

  useEffect(()=>{
    const onPrompt  = () => setInstallPrompt(_pwaPrompt);
    const onInstall = () => { setInstalled(true); setInstallPrompt(null); };
    window.addEventListener('pwa-prompt-available', onPrompt);
    window.addEventListener('pwa-installed', onInstall);
    return ()=>{
      window.removeEventListener('pwa-prompt-available', onPrompt);
      window.removeEventListener('pwa-installed', onInstall);
    };
  },[]);

  useEffect(()=>{
    if(tab!=='team') return;
    setUsersLoading(true);
    fetch(API_BASE+'/api/auth/users', {headers:authHeaders()})
      .then(r=>r.ok?r.json():[])
      .then(d=>setUsers(Array.isArray(d)?d:[]))
      .catch(()=>setUsers([]))
      .finally(()=>setUsersLoading(false));
  },[tab]);

  const createUser = async e => {
    e.preventDefault();
    setCuLoading(true); setCuMsg(null);
    try {
      const res = await fetch(API_BASE+'/api/auth/register',{method:'POST',headers:authHeaders(),
        body:JSON.stringify({email:cu_email,password:cu_pass,name:cu_name,role:cu_role})});
      const data = await res.json();
      if(!res.ok) throw new Error(data.error||'Failed to create user');
      setCuMsg({type:'ok', text:`User "${cu_name}" created successfully. They can now log in.`});
      setCuEmail(''); setCuName(''); setCuPass(''); setCuRole('bdr');
      // refresh list
      fetch(API_BASE+'/api/auth/users',{headers:authHeaders()}).then(r=>r.ok?r.json():[]).then(d=>setUsers(Array.isArray(d)?d:[])).catch(()=>{});
    } catch(e){ setCuMsg({type:'err',text:e.message}); }
    finally { setCuLoading(false); }
  };

  const tabs = [{id:'profile',label:'Profile'},{id:'team',label:'Team Members',adminOnly:true},{id:'notifications',label:'🔔 Notifications'},{id:'app',label:'App & Install'}];
  const visibleTabs = tabs.filter(t=>!t.adminOnly || isAdmin());

  const inp = {width:'100%',background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:10,padding:'10px 14px',color:'var(--white)',fontSize:13,outline:'none',fontFamily:'var(--sans)'};
  const lbl = {display:'block',fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5};

  return (
    <div style={{maxWidth:640}}>
      <h2 style={{fontFamily:'var(--serif)',fontSize:22,fontWeight:800,color:'var(--white)',marginBottom:24}}>Settings</h2>

      {/* Tab bar */}
      <div style={{display:'flex',gap:6,marginBottom:28,borderBottom:'1px solid var(--bdr)',paddingBottom:0}}>
        {visibleTabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:'8px 18px',borderRadius:'8px 8px 0 0',border:'none',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'var(--sans)',
              background:tab===t.id?'var(--surf)':'transparent',color:tab===t.id?'var(--sky)':'var(--muted)',
              borderBottom:tab===t.id?'2px solid var(--blue)':'2px solid transparent',transition:'all .15s'}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── Profile tab ── */}
      {tab==='profile' && (
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20}}>
              <div style={{width:56,height:56,borderRadius:'50%',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:18,fontWeight:800,color:'#fff'}}>{currentUser?.initials||'?'}</div>
              <div>
                <div style={{fontSize:17,fontWeight:700,color:'var(--white)'}}>{currentUser?.name}</div>
                <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{currentUser?.email}</div>
                <div style={{display:'inline-block',marginTop:4,background:'var(--blue-g)',color:'var(--sky)',border:'1px solid var(--blue)',borderRadius:20,padding:'2px 10px',fontSize:10,fontWeight:700}}>{currentUser?.role==='sales_head'?'Admin / Sales Head':currentUser?.role?.toUpperCase()||'USER'}</div>
              </div>
            </div>
          </div>

          <div style={{background:'var(--red-g)',border:'1px solid var(--red)',borderRadius:14,padding:20}}>
            <div style={{fontWeight:700,color:'var(--red)',marginBottom:8}}>Sign Out</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>You will need to sign in again. Session lasts 30 days.</div>
            <button onClick={doLogout} style={{background:'var(--red)',color:'#fff',border:'none',borderRadius:8,padding:'8px 20px',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'var(--sans)'}}>Sign Out</button>
          </div>
        </div>
      )}

      {/* ── Team tab (admin only) ── */}
      {tab==='team' && isAdmin() && (
        <div style={{display:'flex',flexDirection:'column',gap:24}}>
          {/* Create user */}
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <h3 style={{fontWeight:700,color:'var(--white)',marginBottom:18,fontSize:15}}>Create New User</h3>
            <form onSubmit={createUser} style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><label style={lbl}>Name</label><input style={inp} value={cu_name} onChange={e=>setCuName(e.target.value)} required placeholder="Full name"/></div>
                <div><label style={lbl}>Role</label>
                  <select style={{...inp}} value={cu_role} onChange={e=>setCuRole(e.target.value)}>
                    <option value="bdr">BDR</option>
                    <option value="ae">Account Executive</option>
                    <option value="sales_head">Sales Head (Admin)</option>
                  </select>
                </div>
              </div>
              <div><label style={lbl}>Email</label><input style={inp} type="email" value={cu_email} onChange={e=>setCuEmail(e.target.value)} required placeholder="user@company.com"/></div>
              <div><label style={lbl}>Password</label><input style={inp} type="password" value={cu_pass} onChange={e=>setCuPass(e.target.value)} required placeholder="Min 6 characters" minLength={6}/></div>
              {cu_msg && <div style={{padding:'10px 14px',borderRadius:8,fontSize:12,background:cu_msg.type==='ok'?'var(--teal-g)':'var(--red-g)',color:cu_msg.type==='ok'?'var(--teal)':'var(--red)',border:`1px solid ${cu_msg.type==='ok'?'var(--teal)':'var(--red)'}`}}>{cu_msg.text}</div>}
              <button type="submit" disabled={cu_loading} style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:10,padding:'10px',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',opacity:cu_loading?.6:1}}>
                {cu_loading?'Creating…':'Create User'}
              </button>
            </form>
          </div>

          {/* Users list */}
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <h3 style={{fontWeight:700,color:'var(--white)',marginBottom:16,fontSize:15}}>All Users</h3>
            {usersLoading ? <div style={{color:'var(--muted)',fontSize:13}}>Loading…</div> :
              users.length===0 ? <div style={{color:'var(--muted)',fontSize:13}}>No users found</div> :
              users.map(u=>(
                <div key={u.id||u.email} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--bdr)'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:'var(--blue-g)',border:'1px solid var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--sky)'}}>{u.avatarInitials||'?'}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--white)'}}>{u.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{u.email}</div>
                  </div>
                  <div style={{background:'var(--blue-g)',color:'var(--sky)',border:'1px solid var(--blue)',borderRadius:20,padding:'2px 10px',fontSize:10,fontWeight:700}}>{u.role}</div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* ── Notifications tab ── */}
      {tab==='notifications' && (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Browser permission card */}
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--white)',marginBottom:4}}>🔔 Browser Notifications</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>In-app reminders, follow-up alerts and task due dates</div>
            {notifPerm==='unsupported' && (
              <div style={{background:'#3a1f00',border:'1px solid var(--amber)',borderRadius:10,padding:'12px 16px',fontSize:12,color:'var(--amber)'}}>⚠ Your browser does not support the Notification API.</div>
            )}
            {notifPerm==='granted' && (
              <div style={{display:'flex',alignItems:'center',gap:10,background:'rgba(20,184,166,.12)',border:'1px solid var(--teal)',borderRadius:10,padding:'12px 16px'}}>
                <span style={{fontSize:18}}>✅</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--teal)'}}>Notifications are enabled</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>You will receive in-app reminders for tasks and follow-ups.</div>
                </div>
              </div>
            )}
            {notifPerm==='denied' && (
              <div style={{background:'rgba(239,68,68,.1)',border:'1px solid var(--red)',borderRadius:10,padding:'12px 16px',fontSize:12,color:'var(--red)'}}>
                <div style={{fontWeight:700,marginBottom:4}}>🚫 Notifications are blocked</div>
                <div>To enable: click the 🔒 icon in your browser address bar → Notifications → Allow → Reload the page.</div>
              </div>
            )}
            {notifPerm==='default' && (
              <button onClick={requestNotifPermission}
                style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:10,padding:'11px 22px',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'var(--sans)',display:'flex',alignItems:'center',gap:8}}>
                <span>🔔</span> Enable Notifications
              </button>
            )}
          </div>

          {/* Notification preferences */}
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--white)',marginBottom:4}}>⚙ Notification Preferences</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Choose which events trigger notifications</div>
            {[
              {key:'followupReminders',label:'Follow-up due reminders',desc:'Alert when a lead\'s follow-up date arrives',icon:'📅'},
              {key:'renewalAlerts',label:'Renewal alerts',desc:'Alert 7 days before a client renewal is due',icon:'🔄'},
              {key:'taskReminders',label:'Task & reminder alerts',desc:'Alert at the time set on each note or to-do',icon:'⏰'},
              {key:'noContactAlerts',label:'No-contact alerts',desc:'Alert when a client hasn\'t been contacted in 30+ days',icon:'📵'},
              {key:'weeklyDigest',label:'Weekly summary digest',desc:'Monday morning summary of the pipeline',icon:'📊'},
            ].map(p=>(
              <div key={p.key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--bdr)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:18}}>{p.icon}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--white)'}}>{p.label}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{p.desc}</div>
                  </div>
                </div>
                <button onClick={()=>togglePref(p.key)}
                  style={{width:42,height:24,borderRadius:12,border:'none',cursor:'pointer',transition:'background .2s',position:'relative',
                    background:notifPrefs[p.key]?'var(--blue)':'var(--bdr)'}}>
                  <div style={{position:'absolute',top:3,left:notifPrefs[p.key]?20:3,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left .2s'}}/>
                </button>
              </div>
            ))}
          </div>

          {/* Active notification rules */}
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--white)',marginBottom:4}}>📋 Notification Rules</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Automated notification rules configured via the API</div>
            {notifRulesLoading && <div style={{color:'var(--muted)',fontSize:12}}>Loading…</div>}
            {!notifRulesLoading && notifRules.length===0 && (
              <div style={{color:'var(--muted)',fontSize:12}}>No notification rules configured yet.</div>
            )}
            {notifRules.map(r=>(
              <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--bdr)'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--white)'}}>{r.name}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{r.trigger?.type||'—'}</div>
                </div>
                <span style={{fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:8,
                  background:r.enabled?'rgba(20,184,166,.15)':'rgba(100,116,139,.15)',
                  color:r.enabled?'var(--teal)':'var(--muted)'}}>
                  {r.enabled?'Active':'Paused'}
                </span>
              </div>
            ))}
          </div>

        </div>
      )}

      {/* ── App & Install tab ── */}
      {tab==='app' && (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{background:'var(--surf)',border:'1px solid var(--bdr)',borderRadius:14,padding:24}}>
            <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:16}}>
              <BarometerLogo size={52}/>
              <div>
                <div style={{fontFamily:'var(--serif)',fontSize:17,fontWeight:800,color:'var(--white)'}}>Barometer CRM</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Install as a native app on your device</div>
              </div>
            </div>
            {installed ? (
              <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--teal-g)',border:'1px solid var(--teal)',borderRadius:10,padding:'10px 14px'}}>
                <span style={{color:'var(--teal)',fontSize:16}}>✓</span>
                <span style={{color:'var(--teal)',fontSize:13,fontWeight:600}}>App is installed on this device</span>
              </div>
            ) : installPrompt ? (
              <button onClick={async()=>{installPrompt.prompt();const{outcome}=await installPrompt.userChoice;if(outcome==='accepted')setInstalled(true);}}
                style={{background:'var(--blue)',color:'#fff',border:'none',borderRadius:10,padding:'12px 24px',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--sans)',display:'flex',alignItems:'center',gap:8}}>
                <span>📲</span> Install Barometer CRM
              </button>
            ) : (
              <div style={{color:'var(--muted)',fontSize:13}}>Open this app in Chrome or Edge on mobile/desktop to install it.</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  // ── AUTH GATE ─────────────────────────────────────
  const [authed, setAuthed] = useState(isSessionValid);
  const [currentUser, setCurrentUser] = useState(getUser);

  const handleLogin = (data) => {
    setCurrentUser({id:data.id,email:data.email,name:data.name,role:data.role,initials:data.avatarInitials});
    setAuthed(true);
  };

  // ALL hooks must be declared unconditionally (Rules of Hooks)
  const [view,setView]                           = useState("leads");
  const [leads,setLeads]                         = useState([]);
  const [dismissed,setDismissed]                 = useState([]);
  const [notifSelectedLead,setNotifSelectedLead] = useState(null);
  const [renewalNotifDismissed,setRenewalNotifDismissed] = useState([]);
  const [clientBulkOpen,setClientBulkOpen]       = useState(false);
  const [reminderAlerts,setReminderAlerts]        = useState([]);
  const [sidebarOpen,setSidebarOpen]             = useState(false);

  // ── FETCH LEADS FROM BACKEND ──────────────────────
  useEffect(()=>{
    if(!authed || !getToken()) return;
    fetch(API_BASE+'/api/leads?size=200', {headers: authHeaders()})
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d && d.content) setLeads(d.content); })
      .catch(()=>{});
  },[authed]);

  // ── PWA + PUSH REGISTRATION ───────────────────────
  useEffect(()=>{
    // Inject manifest link
    if(!document.querySelector('link[rel="manifest"]')){
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = '/manifest.json';
      document.head.appendChild(link);
    }
    // Register service worker
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').then(async reg => {
        if(!getToken()) return;
        try {
          let sub = await reg.pushManager.getSubscription();
          if(!sub){
            sub = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
            });
          }
          const key = sub.getKey('p256dh');
          const auth = sub.getKey('auth');
          await fetch(API_BASE+'/api/push/subscribe', {
            method:'POST', headers: authHeaders(),
            body: JSON.stringify({
              endpoint: sub.endpoint,
              p256dh: btoa(String.fromCharCode(...new Uint8Array(key))),
              auth:   btoa(String.fromCharCode(...new Uint8Array(auth))),
              deviceLabel: navigator.userAgent.slice(0,50)
            })
          });
        } catch(e){ /* push not supported or denied */ }
      }).catch(()=>{});
    }
  },[]);

  // ── NOTIFICATION SYSTEM ── both banner + browser ──
  useEffect(()=>{
    // Request browser permission immediately on load
    if(Notification && Notification.permission === "default") {
      Notification.requestPermission();
    }

    const fireNotif = (lead) => {
      playReminderSound();
      // 1. Browser notification
      if(Notification && Notification.permission === "granted") {
        const n = new Notification("🔔 Follow-up Reminder — Barometer CRM", {
          body: `${lead.name}\n${lead.contact} · ${lead.followTime||""}`,
          icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233D6FFF'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white'>B</text></svg>",
          tag: `barometer-follow-${lead.id}`,
          requireInteraction: true,
        });
        n.onclick = () => { window.focus(); n.close(); };
      }
    };

    // Check every 30s for follow-up time matches and custom reminders
    const check = () => {
      const now    = new Date();
      const nowH   = now.getHours();
      const nowM   = now.getMinutes();
      leads.forEach(l => {
        if(!l.followDate || !l.followTime || dismissed.includes(l.id)) return;
        if(l.followDate !== today()) return; // Only fire for today's follow-ups
        const [h,m] = l.followTime.split(":").map(Number);
        // Fire within the current minute window
        if(nowH === h && nowM === m) fireNotif(l);
      });

      // Check custom lead reminders from localStorage
      try {
        const rawLR = localStorage.getItem('crm_lead_reminders');
        if(rawLR){
          const allRem = JSON.parse(rawLR);
          let changed = false;
          const newAlerts = [];
          Object.keys(allRem).forEach(leadId => {
            allRem[leadId] = allRem[leadId].map(r => {
              if(r.fired) return r;
              const fireAt = new Date(new Date(r.datetime).getTime() - (r.notifyBefore||0)*60000);
              const diff = now.getTime() - fireAt.getTime();
              if(diff >= 0 && diff <= 90000){
                // Fire the sound + browser notification
                playReminderSound();
                if(Notification && Notification.permission === "granted"){
                  const n = new Notification(`🔔 ${r.title} — ${r.leadName}`, {
                    body: `Reminder for lead: ${r.leadName}\nScheduled: ${new Date(r.datetime).toLocaleString("en-IN")}`,
                    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%233D6FFF'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white'>B</text></svg>",
                    tag: `barometer-lead-rem-${r.id}`,
                    requireInteraction: true,
                  });
                  n.onclick = () => { window.focus(); n.close(); };
                }
                // In-app banner alert
                const alertId = 'ra-' + r.id;
                newAlerts.push({
                  id: alertId,
                  title: r.title,
                  leadName: r.leadName,
                  scheduled: new Date(r.datetime).toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})
                });
                changed = true;
                return {...r, fired: true};
              }
              return r;
            });
          });
          if(changed){
            localStorage.setItem('crm_lead_reminders', JSON.stringify(allRem));
            if(newAlerts.length){
              setReminderAlerts(prev=>[...prev, ...newAlerts]);
              // Auto-dismiss each alert after 12 seconds
              newAlerts.forEach(a => {
                setTimeout(()=>setReminderAlerts(prev=>prev.filter(x=>x.id!==a.id)), 12000);
              });
            }
          }
        }
      } catch(e){}
    };

    check();
    const timer = setInterval(check, 30000);
    return () => clearInterval(timer);
  }, [leads, dismissed]);

  // ─── auth gate render (all hooks are above this line) ───────────
  if (!authed) return <LoginPage onLogin={handleLogin}/>;

  const dueNotifs    = leads.filter(l=>(isToday(l.followDate)||isPast(l.followDate))&&!dismissed.includes(l.id));
  const renewalAlertCount = SEED_ONBOARDED.length;

  return (
    <div style={{display:"grid",gridTemplateColumns:"190px 1fr",minHeight:"100vh",background:"var(--bg)"}}>

      {/* ── HAMBURGER BUTTON (Mobile Only) ── */}
      <button className="hamburger-btn" onClick={()=>setSidebarOpen(!sidebarOpen)}>≡</button>

      {/* ── SIDEBAR BACKDROP (Mobile Only) ── */}
      {sidebarOpen && <div className="sidebar-backdrop" onClick={()=>setSidebarOpen(false)}/>}

      {/* ── SIDEBAR ── */}
      <aside className={sidebarOpen?"sidebar-open":""} style={{background:"var(--surf)",borderRight:"1px solid var(--bdr)",display:"flex",flexDirection:"column",padding:"22px 0",position:"sticky",top:0,height:"100vh",overflowY:"auto"}}>
        <div style={{padding:"0 18px 20px",borderBottom:"1px solid var(--bdr)",marginBottom:16}}>
          <div style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:800,color:"var(--white)",letterSpacing:".02em"}}>Barometer<span style={{color:"var(--blue)"}}>.</span></div>
          <div style={{fontSize:9,color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase",marginTop:3}}>Sales CRM</div>
        </div>

        <div style={{padding:"0 10px",flex:1}}>
          {[
            {id:"leads",      icon:"🎯", label:"Potential Clients",  badge:dueNotifs.length},
            {id:"onboarded",  icon:"✅", label:"Onboarded Clients",  badge:0},
            {id:"notes",      icon:"📝", label:"Notes & Reminders",  badge:0},
            {id:"settings",   icon:"⚙️", label:"Settings",           badge:0},
          ].map(n=>(
            <button key={n.id} onClick={()=>{setView(n.id);setSidebarOpen(false);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,cursor:"pointer",width:"100%",textAlign:"left",border:"none",fontSize:13,fontWeight:400,marginBottom:4,
                background:view===n.id?"var(--blue-g)":"transparent",
                color:view===n.id?"var(--sky)":"var(--muted)",transition:"all .18s",fontFamily:"var(--sans)"}}>
              <span style={{fontSize:15}}>{n.icon}</span>
              <span style={{flex:1}}>{n.label}</span>
              {n.badge>0&&<span style={{background:"var(--red)",color:"#fff",borderRadius:100,fontSize:9,fontWeight:700,padding:"1px 6px",minWidth:16,textAlign:"center"}}>{n.badge}</span>}
            </button>
          ))}
        </div>

        {/* Pipeline snapshot */}
        <div style={{margin:"0 10px 14px",background:"var(--card)",border:"1px solid var(--bdr)",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Quick Stats</div>
          {[
            {label:"Potential Clients", val:leads.length,                                                                    color:"var(--sky)"},
            {label:"Hot Pipeline",      val:leads.filter(l=>["negotiation","proposal_sent","demo_scheduled"].includes(l.status)).length, color:"var(--amber)"},
            {label:"Follow-ups Due",    val:dueNotifs.length,                                                                color:dueNotifs.length>0?"var(--red)":"var(--muted)"},
          ].map(s=>(
            <div key={s.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <span style={{fontSize:11,color:"var(--muted)"}}>{s.label}</span>
              <span style={{fontFamily:"var(--serif)",fontSize:14,fontWeight:700,color:s.color}}>{s.val}</span>
            </div>
          ))}
        </div>

        <div style={{padding:"14px 18px",borderTop:"1px solid var(--bdr)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setView("settings")}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--serif)",fontSize:11,fontWeight:700,color:"#fff"}}>{currentUser?.initials||"?"}</div>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:"var(--white)"}}>{currentUser?.name||"User"}</div>
              <div style={{fontSize:10,color:"var(--muted)"}}>{currentUser?.role==="sales_head"?"Admin":currentUser?.role?.toUpperCase()||"USER"}</div>
            </div>
          </div>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <main style={{padding:"26px 30px",overflowY:"auto"}}>
        <NotifBanner
          leads={dueNotifs}
          onDismiss={id=>setDismissed(p=>[...p,id])}
          onSelect={l=>{ setView("leads"); setNotifSelectedLead(l); }}
        />
        <ReminderAlertBanner
          alerts={reminderAlerts}
          onDismiss={id=>setReminderAlerts(p=>p.filter(a=>a.id!==id))}
        />
        {view==="leads"
          ? <LeadsView leads={leads} setLeads={setLeads} dismissed={dismissed} setDismissed={setDismissed} notifSelectedLead={notifSelectedLead} clearNotifSelected={()=>setNotifSelectedLead(null)}/>
          : view==="onboarded"
          ? <OnboardedView renewalNotifDismissed={renewalNotifDismissed} setRenewalNotifDismissed={setRenewalNotifDismissed} bulkOpen={clientBulkOpen} setBulkOpen={setClientBulkOpen}/>
          : view==="settings"
          ? <SettingsView currentUser={currentUser}/>
          : <NotesView/>
        }
      </main>
      <ChatBot/>
    </div>
  );
}

const container = document.getElementById("root");
if(ReactDOM.createRoot) ReactDOM.createRoot(container).render(<App/>);
else ReactDOM.render(<App/>, container);
</script>
<script>
window.addEventListener('error',function(e){
  const r=document.getElementById('root');
  if(r&&r.innerHTML===''){const em=(e.message||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); r.innerHTML='<div style="color:#FF4F4F;padding:40px;font-family:sans-serif;background:#0B0E1A;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px"><div style="font-size:32px">⚠</div><div>Dashboard failed to load. Open in Chrome or Edge.</div><div style="font-size:12px;opacity:.5">'+em+'</div></div>';}
});
</script>
</body>
</html>
