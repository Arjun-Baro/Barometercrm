# Render Deployment — Barometer CRM
# Docs: https://render.com/docs/yaml-spec
#
# HOW TO DEPLOY (Blueprint):
#   1. Push this repo to GitHub (done)
#   2. Sign in at https://render.com → New → Blueprint
#   3. Connect the repo — Render reads this file automatically
#   4. Fill in the secret env vars in the Render dashboard when prompted
#
# OR deploy manually (what you're doing now):
#   Backend → New Web Service  → Language: Docker, Root Dir: barometer-crm-backend
#   Frontend → New Static Site → Root Dir: (blank), Publish Dir: .

services:
  # ── Backend: Spring Boot API (Docker) ─────────────────────
  - type: web
    name: barometer-crm-api
    runtime: docker
    dockerfilePath: ./barometer-crm-backend/Dockerfile
    dockerContext: ./barometer-crm-backend
    plan: free                     # upgrade to "starter" for always-on
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false                # ← paste Atlas URI in Render dashboard
      - key: JWT_SECRET
        sync: false                # ← paste a 64-char random string
      - key: CLAUDE_API_KEY
        sync: false                # ← paste Anthropic API key
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://barometer-crm-frontend.onrender.com

  # ── Frontend: Static Site (CFM.html) ──────────────────────
  - type: static
    name: barometer-crm-frontend
    buildCommand: ""               # no build step needed
    staticPublishPath: .           # serve from repo root
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /config.js
        name: Cache-Control
        value: no-store, no-cache, must-revalidate, max-age=0
      - path: /sw.js
        name: Cache-Control
        value: no-store, no-cache, must-revalidate, max-age=0
    routes:
      - type: rewrite
        source: /*
        destination: /CFM.html
