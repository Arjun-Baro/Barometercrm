# Render Deployment — Barometer CRM
# Docs: https://render.com/docs/yaml-spec
#
# HOW TO DEPLOY:
#   1. Push this repo to GitHub
#   2. Sign in at https://render.com → New → "Blueprint"
#   3. Point it at your repo — Render reads this file automatically
#   4. Fill in the environment variable values in the Render dashboard
#      (they're marked as "sync: false" below, so Render prompts you)

services:
  # ── Backend: Spring Boot API ──────────────────────────────
  - type: web
    name: barometer-crm-api
    runtime: docker
    dockerfilePath: ./barometer-crm-backend/Dockerfile
    dockerContext: ./barometer-crm-backend
    plan: free                     # upgrade to "starter" for always-on
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false                # ← paste your Atlas URI in Render dashboard
      - key: JWT_SECRET
        sync: false                # ← paste a 64-char random string
      - key: CLAUDE_API_KEY
        sync: false                # ← paste your Anthropic API key
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false                # ← paste your Netlify URL e.g. https://barometer-crm.netlify.app

  # ── Frontend: Static Site (CFM.html) ─────────────────────
  - type: web
    name: barometer-crm-frontend
    runtime: static
    staticPublishPath: .           # serve from workspace root
    buildCommand: ""               # no build step needed
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /config.js
        name: Cache-Control
        value: no-store, no-cache, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /CFM.html
