# ── Server ──────────────────────────────────────────────────
# PORT is set automatically by Render; SERVER_PORT is used locally via run.ps1
server.port=${PORT:${SERVER_PORT:8080}}

# ── MongoDB ─────────────────────────────────────────────────
# connectTimeoutMS + serverSelectionTimeoutMS=3000 so missing DB fails fast (no 30s wait)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/barometer_crm?connectTimeoutMS=3000&serverSelectionTimeoutMS=3000}
spring.data.mongodb.auto-index-creation=false

# ── MongoDB Auditing ─────────────────────────────────────────
spring.data.mongodb.repositories.type=auto

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:changeThisToA64CharacterRandomStringInProduction}
# 30 days in ms (30 × 24 × 60 × 60 × 1000)
jwt.expiration-ms=2592000000
jwt.refresh-expiration-ms=2592000000

# ── Claude AI ────────────────────────────────────────────────
claude.api-key=${CLAUDE_API_KEY:}
claude.base-url=https://api.anthropic.com
claude.model=claude-haiku-4-5-20251001
claude.max-tokens=2048

# ── VAPID Push ───────────────────────────────────────────────
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=mailto:admin@barometertechnologies.com

# ── CORS ─────────────────────────────────────────────────────
cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500}

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Scheduling thread pool ───────────────────────────────────
spring.task.scheduling.pool.size=5

# ── MVC async timeout (2 min for AI API calls) ───────────────
spring.mvc.async.request-timeout=120000

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.barometer=INFO
logging.level.org.springframework.security=WARN

# ── Production profile ───────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
